body:
  text: 敘瑜伽施食雖流通多種其或芟增不一名相糾紛惟本山所行要集乃準雲棲大師之較正即壇儀補注亦大師婆心峻切見末法學者遍弘𦦨口藏揚華態競起俳倡惟好熱鬧三觀妙旨置之不聞所以真言句讀之不清楚手印字種亦失所授況觀門乎蓋印列三十有六於內六合相符初二三尖印一合次變空印與多寶如來發菩提心印一合次遣魔印與自在印一合次真空印與寶勝如來印一合次二妙色身如來印一合次光明如來與乳海印一合印雖六合但字種儀注備有不同故以觀圖合璧用廣其傳意取不勞探討瞭然心目譬猶當臺明鏡湛水摩尼物象洪纖靡逃朕迹吁是書剞劂皆古錐相應三業之筌蹄誠非初學小補余敢齊先哲而妄議耶以是告夫同志其勿忽諸千華二愚山人福聚書
