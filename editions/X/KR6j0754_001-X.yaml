body:
  text: 明古杭雲棲寺沙門袾宏補註修設瑜伽集要施食壇儀修者煉磨治習之謂也以眾生三業念念紛紜欲期與佛法相應故假修治俾三密變為三身八識轉成四智速登聖位利益羣品也如神變疏云若用三密為門不須經歷劫數具修諸行只於此生滿足諸波羅密此在正報說設者鋪排建立也謂建立勝妙壇場排列香華供養奉攀諸聖而施作佛事也此在依報說梵語瑜伽華言相應謂三業同時而不先後共緣一境也手結印時口必誦呪意必作觀三業齊施無有參差始名相應以相應故則外無異緣內有主宰以有主宰故豈非全身總是大悲王以無異緣故正是脫體俱成𠶹哩字審如是三密即是一心一法徧含諸法方能上合十方諸佛本妙覺心與佛如來同一慈力下合十方六道眾生與諸眾生同一悲仰世出世間隨願即成凡有所作皆獲如意此瑜伽大本有五部一佛部即佛說呪二蓮華部諸菩薩呪三金剛部金剛神呪四寶部諸天神呪五羯磨部諸鬼神呪每部復各有五即成二十五部於中皆權實雙彰顯密並談今集要者乃聚集此五部之中至精至奧之要義也施食者梵語檀那此云布施居六度首為萬行先有財法無畏三種之別題雖獨標施食而文則兼有也經云一切眾生皆依食住若無飲食身體飢羸縱有財法奚濟身命蓋緣極苦眾生而起悲濟故先施其食也然食又有四種所謂段觸思識是也食者有資益之義任持之義謂此四食能持有色根身令不斷壞故名為食段謂分段以香味觸三法為體變壞為相惟欲界有乃人天食也觸者乃六識相應之心所若觸著可意之境攝受喜悅諸根和順心便怡暢能為食事有資益義即鬼神食也思者即意地有漏思與欲俱轉希望勝妙之境資益身命於中緜想不斷如望梅止渴懸餅充飢等有資益義即禪天食也識食者即阿賴耶識一類相續執持有色根身令不壞爛有任持意此則一切眾生平等共有不擇凡聖也約事而言即前三食約理而言即後一食何也謂藏識具本覺不覺二義以此識食則施者訓為開發之義謂開發眾生本有之覺性俾其轉識而成智也壇者生也集也謂出生無盡功德法故亦是聖賢集會之處即今所建曼怛是也儀者儀規乃千古不易之式也要而言之謂修攝身心鋪設壇場作瑜伽施食之法也此乃善本之題目何謂題題者題頭挈其綱領也目者名目列其條序也如人之有頭則四肢無不具焉似人之有目則六根奠不該焉有此妙義故名之曰題目登臺拈香如世尊將成道時以牧牛女所付拘留孫佛之爐執爐燃香繞壇繞樹合三十二帀於是十方諸佛普皆雲集各手授香親付世尊熱此香時十方眾生一切天人皆得生信悟道然後方登金剛寶座成無上道故佛凡說法時必先執然香蓋古佛說法之儀式也又香以表信為義佛法大海唯信能入華嚴云信為道元功德母長養一切諸善根又信心如水清珠能清濁水水清月自現心信佛出興是知欲達諸聖先具正信信無形相藉香表之香煙徧處信心必通以心感佛何佛而不應也此一瓣香乃剋指法體而言也夫吾人法性量充沙界體含萬有湛若澄清之海香騰薝蔔之林明逾日月德等太虗舒之能徧於法界卷之可納於微塵為萬象之根源作天地之玄祖歷千劫而不古卓然而獨存者其唯自性歟或於一塵之內而現全身五眼莫能覩其形或於六根之門而耀威光四辨莫能談其狀聞之則穿過髑髏頓枯識海觸之則沖破頂𩕳豁開正眼者其唯心香歟故知此香人人本具個個不無但自一念回光身心一如有何欠虧信者垂手而得然之普天遙聞不待僧祇熏修清氣本自天然十方佛土唯此為最三藏教海誰不摧尊法華云唯此一事實餘二則非真方是此一瓣香之意是知此一者乃當體得名包含為義香者謂法體上無有妄染雜穢之氣純一無漏功德之香又能流出無盡教海熏諸眾生若有聞法者無一不成佛故眾香世界唯以香塵而作佛事聞其香者皆得法忍又是五分法身之香從戒定等所熏成故故曰香也不從天降豈屬地生凡世間者未有不從地產雨露陽和而滋長者今曰不從天降地生者何也蓋吾人心香天不能葢地不能載尚非因之而生豈待栽培而後成者耶假饒無功用行皆是妄興勞慮殊不知法法現成信手拈來無所不是又何必三條椽下七尺單前晝三夜三廢寢忘餐乃至六度萬行塵沙法門然後方為究竟也故先哲云吾覓得無陰陽地一片種得一株無根樹子日照無影風吹不動運金斧以難入經劫火以愈芳開無聲無臭之花結非青非黃之果不煩攀枝折葉已在諸人𮌎中已兩儀未判之先根源充塞三界空劫已前威音那畔則心境未彰染淨圓融而本體虗玄性絕邊表無形之形形充法界非寂而寂寂照含虗豎則窮於三際橫則徧該十方豈唯充塞三界抑且剎海無遺故經云若人欲識真空理心內真如還徧外情與無情總一體處處皆同真法界傅大士云有物先天地無形本寂寥能為萬象主不逐四時彫旨在斯乎一炁纔分之後枝葉徧滿十方混沌一炁即太極所謂道生一者也太極分兩儀即一炁分為陰陽輕清為天重濁為地所謂一生二者也約小乘上說一炁者即光音金藏雲陰陽者即所雨之雨清者先成天宮濁者次成洲海良以竺墳未至儒老權說設義未免究竟故不繁釋從陰陽化育人及萬物即二生三三生萬物者也是知外教以一炁為根本人及萬物為枝末在內教約理說即第八識王所未分心境未彰故云一炁也謂依如來藏有生滅心不生滅與生滅和合非一非異而成阿賴耶識內有此識外有空界所謂晦昧為空者故知一炁是彼識體不了本空轉成能見能現於是遂有根身器界之分陰陽化育之象故楞嚴云內之根身外暨山河虗空大地咸是妙明真心中物如是則一心是根源萬物為枝末矣故肇法師云天地與我同根萬物與我同體稱理起事事復何窮依鏡現形形寧有盡此四句正是宗門意旨劫外今時打成一片偏正回互賓主歷然之旨超日月之光華金光明經云日月雖明不能透覆盆但照四天下而已若心智之光上窮有頂之天下徹無間之地普照法界煥若掌珠如理智徧照真如門中無漏性德如量智徧照生滅門中染淨事品故經云圓明了知不因心念明不循根寄根明發一切暗相永不能昏祖師云靈光獨耀迥脫根塵不同虗空性自神解故曰超日月之光華也奪山川之秀麗山川雖秉造化精英而秀麗可觀者乃確乎不變之定法夫吾人心香能轉變自在卷舒無礙殊形異狀幽顯莫測或於一毛端頭現無邊剎海或假輕煙內示華藏莊嚴乃至雲臺寶網悉為心感密生閴豈外性德又一切山川以正眼觀來猶如空華亂起亂滅無如此心真實不常不斷以理形事故曰奪山川之秀麗如寶藏云其為也形其寂也冥本淨非瑩法爾天真光超日月德越太清萬物無作一切無名轉變天地自在縱橫恒沙而用混沌而成誰聞不喜孰見不驚如何以無價之寶隱於陰入之坑即其義也即戒即定即慧本性無染即戒無亂即定無癡即慧三學圓明一心自淨二諦渾融萬德頓彰非木非火非煙明心香本無生也如楞嚴云此香若生於木則此香質因爇成煙若鼻得聞合蒙煙氣其煙騰空未及遙遠室羅筏城四十里內云何已聞是知不生於木與煙矣若生於火何藉爐中爇此枯木則一切火皆是香氣是知不生於火矣既不生於木火煙又豈復生於空耶若生於空空既常在香應常聞空既無香則知不生於空矣四皆非香生因則當體性空性空即諸法實性實性則無生矣無生之香方為法身功德之香也收來在一微塵德山云百千法門無量妙義吾向一毫頭上識得根源者也散處普熏法界放之則彌六合卷之則退藏於密昔西域異見王問波羅提尊者曰佛性在何處答曰佛性在作用處曰當作用時其處有幾曰當作用時其處有八在胎名身出胎名人在眼曰見在耳曰聞在鼻嗅香在舌談論在手執捉在足運奔徧現俱該沙界收攝只在一塵識者喚作佛性不識喚作精魂也爇向爐中至普同供養鼎有三足表法身般若解脫三德祕藏謂此心香安住於三德祕藏之中而成妙香密圓最上之法供也常住三寶者即一心也是心清淨名佛光明名法淨光和合處處無礙名僧昔本不生今亦不滅名為常住而曰供養即因心與果覺冥契也所謂諸佛法身入我性我性同共如來合也剎者最廣海者最深剎海既無邊量聖賢寧有窮盡歷代祖師幽顯靈祇莫不承此真香而普同供養夫如是方名真法供養虗空有盡此香無涯也次皈敬請加人天見佛先讚後皈將興勝妙利益必先皈敬三寶懇求加被如清涼國師云歸讚者有六義一荷恩德二請加護三令生信四為儀軌五表尊勝六顯益物有此六義故先舉偈云佛面猶如至皆具足佛面圓滿皎潔猶如清淨滿月並無纖毫不備之相非但如月之圓亦如千日之光以月面放光輝煌赫奕無可為喻故以千日同時放光而比之也又項佩圓光普照十方設使一處不週不得謂之圓光必如是塵剎普徧容光必照無放無收方名圓光千尋也面光圓光既然如是則通身之光又不思議可知矣是知如來之身當體即法身大光明藏也慈悲喜捨者乃佛之四無量心利他之功德也如淨名經云文殊問曰何為慈淨名曰為諸眾生說寂滅法是真實慈何為悲曰所作功德與眾生共何為喜曰有所饒益歡喜無悔何為捨曰所作福祐無所希望依偈意顯佛非唯具六度七覺八正十力十四無畏十八不共自受用法等而慈悲喜捨利他之功德皆悉具足矣前三句讚佛相好後一句讚佛功德然佛之相好功德無量無邊縱我窮劫音聲聯續曷能讚其萬一哉如華嚴經云剎塵心念可數知大海中水可飲盡虗空可量風可繫無能盡說佛功德南無盡虗空至三寶梵語南無此云皈命皈者依投趣向義命者總御諸根一身之要人之所係莫不為先舉此無二之命以奉無上之尊表敬之至也又歸者返本還原義謂眾生背覺合塵從一心而起六根流轉生死今總攝諸根還歸一心令清淨光明而成自性三寶也三寶有同體別相住持之殊同體者法界為體覺照即佛義軌持即法義和合即僧義別相者法報化三身名佛教理行果名法五果四向十地三賢名僧住持者雕刻塑畫名佛黃卷赤牘名法圓頂方袍名僧而今獨皈盡空徧界者何正顯所歸之佛無窮無盡而我能歸之心亦無量無邊矣次趺坐頂冠入根本定起觀音慢云何登座必須起觀音慢與入定耶殊不知施食一法根於世尊作婆羅門時曾於觀世音菩薩處受無量威德自在光明陀羅尼法能變少食普週法界夫如是則觀音是施食之鼻祖也今吾本具縛凡夫不憑聖功而自作觀音必難乎其為有濟矣究理言之我與觀音實無殊別也觀音是我本體𠶹哩字是我本具故慢之一字即天上天下唯我獨尊之旨又諸佛說法必先入定鑒機法華圓覺自有明徵當會而審詳可爾既欲起慢先須入定應觀自心如秋月輪光明皎潔中有白色𠶹哩字此字名阿彌陀佛一字呪是大悲真體利生妙智如金剛三昧耶經云此字具四種義一賀字門即一切法因不可得義二囉字門即一切法離塵義三伊字門即自性不可得義四德字門即涅槃義亦名慚義若具慚愧不為一切不善法具足一切無漏法又蓮華部云阿彌陀佛以此字加持於極樂國中水鳥樹林皆演法音所以若觀此字則一切諸法之因了不可得本是離塵自性清淨當體即涅槃所以西方三聖初證此心印便即運悲利生也問既曰入定又曰作觀何也答曰觀乃定前加行之方便乃假想慧耳定者令心專注於一境不昏不掉心心無間念念寂滅名之為定如文殊云初學不思議三昧繫心一緣若久習成就更無心想常與定俱故先作觀引起心月字種分明顯現次則定心專注觀境湛寂不動不動之處即定明顯處即觀也又定慧二法不可單運如車之有兩輪如鳥之有兩翼缺一不可失之則無淩霄致遠之功若偏於定則曰愚單修於慧則曰狂二皆不能明見佛性如日不明孤燈照物不了必如是止觀雙修定慧均等始可了了見於佛性故正觀時資之以定則不散正定時加之以觀則不昏如是方名即定之慧即慧之定寂照同時明靜均修始是定慧力莊嚴以此度眾生是證無上道矣問若夫緣境何足擅於月輪耶答昔西域十四祖龍樹菩薩為眾說法於其座上現自在身如滿月輪一切眾生唯聞法音不覩祖相眾中有長者子名迦那提婆謂眾曰識此相否眾曰目所未覩安能辯識提曰此是尊者現佛性體相以示我等何以知然蓋以無相三昧形如滿月任運自在皎潔清淨雲霧不能蔽其光輝萬象不能奪其精氣千古無虧佛性之義廓然虗明故現斯而表之也言訖形相即隱復居本位而說偈言身現圓明相以表諸佛性說法無形相用辯非聲色彼眾聞偈頓悟佛性咸求出家是知月輪者正吾人本體無相三昧也所謂慧月在懷靈珠在握法界同徹無不照矣既入觀音定必契觀音體體既頓證何患輪相用之不然乎三大圓具則自身等觀音可謂慢不起而自是觀音也以菩薩具三十二相八十種好項佩圓光其身金色坐大蓮花頂戴五佛冠五佛常流光灌頂及以威神加被令其神通廣大入生死海教化眾生我今亦頂此冠則五佛必然從五智流光灌我頂門令我身心堅固神通廣大威德智慧辯才無礙以利羣生也五佛者均遮那佛所現謂遮那如來內心證自受用已成於五智一大圓鏡智流出東方阿閦如來執金剛杵二平等性智流出南方寶生如來執摩尼珠三妙觀察智流出西方彌陀如來執妙蓮華四成所作智流出北方成就如來手輪相交五法界清淨智即中央毗盧遮那如來手千輻輪五佛各有四菩薩阿閦佛四菩薩者一金剛薩埵菩薩二金剛王菩薩三金剛愛菩薩四金剛善哉菩薩寶生佛四菩薩者一金剛寶菩薩二金剛威光菩薩三金剛幢菩薩四金剛眷菩薩彌陀佛四菩薩者一金剛法菩薩二金剛劍菩薩三金剛因菩薩四金剛利菩薩成就佛四菩薩者一金剛業菩薩二金剛語菩薩三金剛藥叉菩薩四金剛拳菩薩毗盧佛四菩薩者一金剛波羅密菩薩二金剛寶波羅密菩薩三金剛法波羅密菩薩四金剛羯波羅密菩薩五方五佛各四菩薩共二十五連四攝八供四攝者一金剛鉤菩薩二金剛索菩薩三金剛鎖菩薩四金剛鈴菩薩八供者金剛花菩薩金剛香菩薩金剛燈菩薩金剛塗菩薩金剛果菩薩金剛樂菩薩金剛歌菩薩金剛舞菩薩共三十七位皆本師遮那如來智用流出不離一真之境化儀百變縱分億數之身千江一月所以觀音頂此冠者意顯帶果行因圓彰法界無盡之體耳南無大悲觀世音菩薩請求出定加持法水之故也一稱其名解脫諸苦大悲經云此菩薩不可思議威神之力已於過去無量劫中作佛號曰正法明如來大悲願力安樂眾生現為菩薩未來成佛號曰普光功德山王如來梵語阿耶菩婁吉底輸此云觀世音觀者能觀之智指應而言世音是所觀之境對機而說智能照窮正性察其本末機則萬象流動隔別不同類音殊唱被智一觀俱時離苦正如普門品云若有眾生稱念我名即時觀其音聲皆得解脫而曰大悲者謂此菩薩悲心偏重故爾不同生緣法緣之小悲乃無緣同體之悲故曰大悲也梵語菩提薩埵華言覺有情已覺斯道而覺斯民之稱也夫此水者八功德水安養國有七寶池水皆七寶中之所流出言八功德者一澄清謂澄停潔淨離染污故二清涼謂明湛涼冷無煩熱故三甘美謂甘和美妙具至味故四輕輭謂輕揚柔輭可上下故五潤澤謂津潤滑澤不枯澀故六安和謂安靜和緩絕迅汎故七除飢渴謂水僅止渴今兼療飢有勝力故八長養諸根增長養育身心內外故謂此瓶內之水即如西方寶池內性功德水也如牧牛女付瓶與世尊云此瓶內具足八功德水飲之能除飢渴煩惱亦消不久當成無上菩提為人天說法也自天真至無處不超淪天真者本來自性天真也業即善惡無記三業垢即煩惱障玷污法性故塵即所知障蔽智眼故眾生具此三業二障一則令自性不得清淨生死不得解脫二令法水觸途成滯今先洗而淨之則無復留礙然後推廣其心運此法水週徧滾入華藏世界與香水海性合真空普沾情器當體清淨業累既遣內外渾真此真個之中何處更有眾生而不超於淪溺乎上明水體妙合天真下明返已其玄奧水不洗水妙極法身經云性空真水性水真空清淨本然週徧法界既云週徧則大地皆水也塵自何立水既無塵用洗奚為豈有水復洗水之理哉如刀不自割火不自燃水不自洗真可謂微妙絕待法身極則之理不假修證也塵不染塵返作自己古德云盡道水能洗垢焉知水亦是垢如病痊藥除藥存病生故說水亦是塵水雖同塵終不染於業垢之塵亦可將彼塵性返作吾之自己以諸塵性同一緣起當體性空以空合空以水投水何有自他之分所以云會萬物為己者其惟聖人歟蠲除器界蕩滌壇場上出水體下彰水用謂此水而蠲器界滌壇場則自然氛消八面霧斂長空殊勝清淨也灑枯木至而成淨土謂此水有起死回生之功翻穢成淨之能灑於枯木遂使枯斡重榮寒巖花笑潔於穢當下即成清淨寶莊嚴土令諸眾生步步踏金界之域念念聞薝蔔之香非唯如此而已兼有無量妙義不可勝紀向下總收而結之也所謂道至縱清涼內之根身外之器界中之識心皆無濁穢四聖六凡總得清涼無復餘累矣大悲神呪復藉呪力加持此水令其頓同菩薩柳頭甘露法水成就勝妙殊勳也理事圓融顯密齊暢正所謂快舸順風之勢更加櫓棹之功則疾屆寶城速登彼岸信手拈來無不是已并誦此呪不獨為水更有無量妙義多端勝益如大悲經云爾時觀世音菩薩白佛言世尊若諸眾生誦持大悲神呪墮三惡道者不生諸佛國者不得無量三昧辯才者我誓不成正覺誦持大悲神呪於現在生中一切所求若不果遂者不得為大悲心陀羅尼也即於佛前現千手眼而說是呪由此證之故知不獨為水耳又金光明云十地菩薩尚以呪護持何況凡夫首楞嚴云若不持呪而坐道場遠諸魔事無有是處凡陀羅尼或一字多字皆是佛菩薩自覺聖智所證法界妙心字字皆從無相國流出所以辭句惟佛與佛乃能究盡只宜誦經持呪供養則生福發慧斷障除愆凡所希求必獲如意不可妄自臆度裁量聖心小乘極果尚不知大乘初心況於如來祕藏乎又呪乃是諸佛菩薩名號稱其名者必為諸佛菩薩之所護念或是諸天魔梵及鬼神王名號稱其名號則部從敬主不敢為難行殃又呪似軍中密號唱號即應不敢違背又呪者祝願也願此事必竟成就也如蜾之祝螟蛉似我似我而此似我之聲念茲在茲相續不斷諸蟲受熏莫知然而化為蜾矣諸佛菩薩以慈悲教化熏諸眾生故眾生莫知然而離苦得樂轉凡成聖矣如大悲菩薩陀羅尼曰譬如靈丹妙藥點鐵成金誦持陀羅尼變凡作聖此之謂也甘露王菩薩此喻以顯法澤也甘露者乃帝釋面前有波利質多樹此翻為員生葉上每垂滴玉露其味甚甘食之者能長生不死永離飢渴衰惱等患正喻法水如其甘露能長養眾生法身慧命增一切禪定功德不被三災八難等苦而煎迫也超彼甘露故謂之王唱時以右手無名指點盂中之水彈灑虗空令器界皆得清淨沾露眾生咸獲清涼也如上所論全談理地向下作法實益事界如經云理須頓悟乘悟併銷事非頓除因次第盡故當如漸次淨身界也淨法界真言法界者總該萬有即是一心元依一真法界分而為四一理法界法者軌生物解之義理是性義無盡事法同一性故二事法界事是分義一一義別有分劑故三理事無礙法界一切分劑事法一一如性融通重重無盡故實際理地不受一塵不待淨而自淨也四事事無礙法界事有染淨固當簡別而事界之中又有身器之別此則淨事界之根身也以根身是父母赤白二點所成并積生無始虗習故淨之也以六根四肢各有法則各有界限是故名為法界耳誦呪時調伏身心想頂臍具有唵㘕二字以表福智圓滿何則非福不能具相好非智不能淨餘累福智圓滿則內障自淨外相自嚴故觀唵字在頂㘕字在臍頂者一身之首臍乃命脈之源淨此二處則六根四肢無不淨矣問云何二字便致二嚴答經云唵字者是法身真理即一切法本不生義又三身義無見頂相義亦是如來相好功德義觀之在頂即具如上諸義也㘕字者即真言儀軌云此名寶曇佛智光徧照三摩地若想若誦令三業悉皆清淨一切罪障盡得消滅又能成辦一切善事隨所住處悉得清淨衣服不淨便成淨衣身不澡浴便成澡浴若用水淨不名真淨若以此字淨之即名畢竟清淨如靈丹一粒點鐵成金真言一字變染成淨偈云㘕字色鮮白空點以嚴之如彼髻明珠置之於頂上真言同法界無量眾罪除一切觸穢處當加此字門所以用此字置於命元者則諸根圓內瑩發光矣故楞嚴云一根既返原六根成解脫此之謂也點淨真言此淨器界故云點淨念真言時用右手無名指揑取香水彈灑虗空并塗掌上想壇場內外悉皆清淨圓覺經云一世界清淨多世界亦然如是乃至盡於虗空圓裹三世一切平等清淨不動淨名云隨其心淨則佛土淨加持華米真言花者因義以此米為因誦真言時想成智慧光明種出生金銀碧玉等雲預先加持者彼用之時隨心轉變而不違也正所謂工欲善其事必先利其器之意也鈴杵真言鈴者有適悅義置腰之左表大我焉謂此我非同凡夫情計之我乃法身中常樂我淨真常寂滅之我涅槃經云一切眾生皆有佛性即是我義如鈴相似虗而能應感而遂通稱適佛心悅豫羣機故鈴談慈表我德也振之以悅生佛之心故耳杵者示威義又表五智轉拳向外以示眾生也表五智者以智能摧滅煩惱降伏魔軍故誦真言時右手拈花米灑鈴杵上而加持之唵阿吽此名三字總持真言凡諸作法以此真言總加持之皆得堅固廣大無窮無盡之用也瑜伽大教經云由持此唵字加持威力故縱觀想不成於諸佛海會及供養雲海真實具成就由諸佛誠諦法爾所成故由適誦阿字摧滅諸罪障獲諸悅意樂等同一切佛超聖眾魔羅不能為障礙應受諸世間廣大之供養由吽字加持虎狼諸毒獸惡心人非人盡無能淩屈如來初成道於菩提樹下以此印密言摧壞天魔眾是此三字既具如斯妙用是故文中重重念之次振鈴唱十二因緣呪正顯上來所有諸法皆從因緣而有當體皆空中論云未曾有一法不從因緣生是故一切法無不是空者故三界轆轤皆屬因緣欲證無為必仗神呪之力轉生滅而成還滅也誦呪之後得心自在得法自在隨其所欲不違拒也何謂十二因緣轉輾感果為因互相由藉為緣即法華所言無明緣行乃至生緣老死等是也無明者無有智慧之明也體即隨癡迷暗為性即真如不守自性一念妄動而有不覺迷覆真性故謂無明即是惑也行者於過去時所造善惡之業名之為行由惑造業故曰無明緣行識者有了別之義此即第八阿黎耶識也由業因故牽生三界意識妄動投托母胎故云行緣識既托胎矣即有壽煖識三字七日一轉而成名色名是心色是質故云識緣名色六根成此胎中既有心色即成就六根故云名色緣六入以根有入塵之義故謂之入觸者出胎已後由根對塵而未能分別故云六入緣觸受者有領納之義領納世間善惡等事由六根觸境故而後領納故云觸緣受愛者好樂世間可意之境由領納故然後生愛故云受緣愛取者取著不捨之意見一切境皆生取著由愛生著故云愛緣取由取著故起惑造業當生三有故云取緣有既有三有之因必當生故故云有緣生既有生故必有老死等果也此十二緣生總該三世因果如旋火輪無有休息無明與行過去二支因也識名色六入觸受此現在五支果也愛取有此現在三支因生老死未來二支果總名流轉門也今行者既從曠劫以來隨無明等緣故感現在苦果今以戒定慧觀照方便之力神呪加護之功照自他身心境體相皆自性空無內外有即我此心同佛智海是稱為還滅門也所以十明論云迷十二有支則為苦海號曰眾生悟十二有支自性本空即是大寶莊嚴城名之曰佛今行者神呪智力加持功德頓令十二因緣而成佛波羅密海也如上所論借權顯實攝事就理會假歸空培植萬德之本也我及法界至上師三寶從此以起正明行願相資建壇設供莊嚴淨土而攀諸聖也未行而先願者蓋願乃志氣之要約若不先願堅固其心恐生懈怠故須先發願皈依三寶若不皈依凡有所作盡成魔業并仗上師三寶冥熏加被令我本願速得成就也行者持花米於手中白云我及法界一切有情正顯其不專為己而發此廣大之心從今以至未證之間正顯其願之堅固而常時無退怯也誓皈上師三寶者正顯其發心廣大最勝無上也金剛上師居於三寶之首以佛所師之法故如大智度論云諸佛以實相為諸法依此實相發心修行方成菩提若不以此為師皆是天魔波旬報恩云佛以法為師般若云我初成道觀誰可敬可讚無過於法皆能成度一切凡聖故所以上師即法也金剛者喻實相也取堅利不變之義所以華嚴文殊云所從來國謂金色世界等所師之佛謂不動智如來等金色世界即喻實相也不動智即根本智也即是金剛上師居首者此之謂也捺謨孤嚕至桑渴耶此四句是皈依三寶首句皈依上師次三句是皈依佛皈依法皈依僧是也唵哩哩哈哈者正上師也唵失哩麻哈者正三寶也唵阿吽復念此三字總持而加持之灑花米於虗空想所落寶米即成花香種種供養等雲而奉獻之令無盡也次請三壇主先伸偈焚香讚請然後獻供羅列香花至一毫端星羅布列名香鮮花建此勝妙眾寶之壇重重無盡之佛境皆現我一毫端字不相妨礙也而毛端不大佛境不小而能週徧含容互無障礙猶如一尺之境現千重影此即事事無礙境界廣狹無礙自在門也經云於一毫端現寶王剎坐微塵裏轉大法輪帝網鏡珠隨意遊入依正大小隱顯互映此非智巧所能蓋為法應故爾心融妙理至法界寬此二句讚法身德謂心與妙理融會之時即見法身廣大無際反觀世間虗空如海一滴楞嚴云爾時阿難𫎇佛如來微妙開示身心蕩然得無礙是諸大眾各各自見心徧十方見十方空如觀掌中所持葉物此其義也道者智行也謂此智行若與真如貼體契合則見法界之性豎窮三際橫徧十方寬廓無涯如人入海愈見深廣也此是理法界意相好慈悲至暮雲繁此讚報身般若德夫佛根身身有無量色色有無量相相有無量好慈悲喜捨等皆悉具足如同秋月圓滿無缺也此讚應化二身解脫德言佛之化身徧歷十方應機六道儼若晚暮之雲繁興鼓躍任運騰騰靉靆無可承攬矣此二是事法界香煙堆裏至海印含佛之三身神妙莫測有求皆應無願不從寂然不動感而遂通我今香煙堆裏瞻望應現色身而降赴也猶如海含萬象分明顯現如印成文不假先後古德云澄潭瑩淨明鏡空懸萬象森羅廓然虗鑒今則信心懇切一念湛寂則千聖貞歸萬靈交會豈獨三壇主乎此二是理事無礙法界意正請之文也釋迦如來娑婆教主現在賢劫第四佛梵語釋迦此云能仁謂能有仁慈惠濟眾生梵語牟尼此云寂默永寂二邊默契中道如來者謂從如中而來故名如來乃是然燈佛授記之號今請證盟者我今依教作法佛必印可也觀世音菩薩此如前釋是甘露教主請求密垂加護俾所作成辦阿難陀尊者是興權啟教之主施食之宗師也梵語阿難此云慶喜如來堂弟多聞第一良以法不孤起仗境方生欲益未來先興權化故於林間習定夜覩非形之態歸投白佛哀求救苦之方佛示威德之神章大開甘露之法門於是昏衢頓朗萬物回春匪仗尊者之悲心權現曷有施食之教乎振鈴念自性偈方便自性至大勇識方者法也便者宜也謂將善巧方法隨順眾生之機宜如現身不定也以妙體本來離相為諸眾生而現諸相所有之相皆一期隨緣之方便耳此方便自性之體如金不變如剛堅利混塵鑛不壞其體入大冶不變其色不為物所壞能壞一切物以此自性之體雖不變而能隨緣示生三界與民同患又能斷眾生之癡網破煩惱之牢城故喻之如金剛本來不壞也大勇者能勝怨敵能怖魔軍大識者即一切智無所不燭世出世間惟佛能知之謂也最勝無比至皆成就雖不變而不妨隨緣雖隨緣又不妨不變所以最極殊勝無可為比也善超諸有越諸塵累靈知絕待逈出思議之表故曰超出相佛本既然我今所作亦願成就此妙體也已上四句乃讚佛現身之體向下四句正讚佛說法之體也勝慧自性至法輪音諸佛智慧甚深無量其智慧門難解難入假使聲聞緣覺及諸菩薩積滿河沙亦所不知故曰勝慧其自性最極甚深以甚深故方能演說法音也法而曰輪者何也輪者有推轉之義轉此法輪能為眾生摧碎煩惱轉凡成聖耳經云從根本智流出後得智從後得智流出大悲心從大悲心流出十二分教所以說法皆以智為體性以無生現至願得成說法不離其身身本無身方便而現諸身耳法華云時我出世間方便為眾生諸佛所得法故曰以無生現方便身彼既如是我亦應然故曰今此所作願得成也佛身之智如此甚深微妙最勝無比未有無漏之身而依有漏之土故念淨地偈轉穢成淨以便安住諸聖賢也一切方隅至等皆無即後所建曼怛之方隅也非如娑婆世界雜穢充滿土石諸山瓦礫砂磧坑坎堆阜不平不淨之地今皆變成瑠璃之寶地瑠璃寶地至願具足掌者海底有石最極平滿既平如掌柔輭如緜微妙無比願佛慈悲於此安住極樂國中妙寶為地眾寶為園瓊林玉樹危樓迥帶金臺銀樹閣道傍出棟宇相承窗闥交映階墀檻楯池沼花林種種滿足一切皆以妙寶所成法音所演之處無不具足矣從出世間至願安住如來在世於娑婆而變為淨土今佛入滅無能再現我今從佛出世之法復能再現此種種七寶所成之地無量光明徧照內外輝煌赫奕光照之處願諸聖賢於此安住不動也至此應當獻供念濯足真言結蓮花印念梵五供散䞋念斯麻囉呪故有濯足灌沐真言即浣足意也書云滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足唱音樂呪置鈴於案誦淨地呪音樂呪凡唱此呪者如鈞天普奏五音和雅六律交暢微妙通徹供養十方三寶也唵斡資囉二合麻明啞吽初總明世界因起如俱舍頌云空界大風起傍廣數無量厚十二洛叉金剛不能壞此名持界風光音金藏雲布及三千界雨如車軸下風遏不聽流深十一洛叉始作金剛界次第金藏雲布雨滿其內先成梵王界乃至夜摩天風鼓清水成須彌七金等滓濁為山地四洲及泥犂醎海外鐵圍方名器界立此名眾生世間唯因迷妄而起楞嚴云一切眾生本覺妙明覺元心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發徧迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立若夫佛出世間國土者即淨土也為從一切法空之理隨定智力應念而現不涉籌量如幻術力剎那頓彰大小染淨隨心應量如善財入彌勒樓閣以三昧力具見莊嚴等事忽然不見問彌勒曰適來境界從何處去曰從來處去曰從何處來曰智慧中來依智慧神通而住若隨法性萬象都無隨願智力何所不成乎次微細委釋世界因起夫未免形累者故須託土以居八地已上永脫色累照體獨立神無方所用土奚為然復現有染淨差別者無非因時設化接引羣機耳將建曼怛先釋因起竟輪圍山即大鐵圍山鐵圍山念真言時手拈花米於曼怛上右旋散灑如空注雨成此二山輪圍山在外鐵圍山在內高六百八十萬由旬此云限量大由旬八十里中六十小四十從廣隨應或一四天下量或小千量或中千量種種不定彌牢堅固金剛所成難可破壞此大千界外總有座大輪圍山高至四禪範圍之內總名三千大千世界金剛地至而作擁護此成金剛界手拈花米於曼怛囉中間書一吽字作擁護排列花米從中間而出勝金剛地基者讚智力所現不同眾生妄想也若依次第差別因起者如因本經云此大地厚四十八萬由旬地輪依水輪水輪依風輪風輪依虗空虗空依妄想妄想依真如真如無所依水聚厚六十萬由旬水上別有風大吹轉於上成金如熟乳上生膏名為金輪厚三洛叉二萬由旬風聚厚三十六萬由旬各廣無量其大海中有須彌山出水為大小須彌山即七金山乃大須彌山之輔山耳大須彌山此翻妙高山下根連住金輪之上皆七寶所成金銀瑠璃玻瓈硨磲赤珠瑪瑙合成下狹上闊漸漸廣大端直不曲最勝可觀曲臨海上高八萬四千由旬四面有四峯一峯各有八天中間一峯名忉利天帝釋所居即玉皇是須彌山半四面有四埵名四天王天又下三級有堅首持曼常憍三天是八部天神所居須彌四維各去百由旬有七重紫金山小須彌山各高七百由旬其底平正四寶所成生種種樹茂花菓多諸聖賢之所住處一名雙持二名持軸三名擔爾四名善見五名馬耳六名象鼻七名魚嘴又有七重香水海一吉祥二醍醐三酪四酥五乳六酒七蜜一重紫金山內一重香水海一海遶一山魚嘴山外即是大海名曰醎海日月宮殿遶大須彌山腰常行不息東始南中西出北半夜南贍部洲正當午北俱盧洲打三鼓六箇月北行六箇月南行每日行六俱奢在閻提最極南垂地形狹近日過速疾冬則晝短夜長漸向北行日移六俱奢當洲中行地寬行久夏則日長夜短寒暑者謂須彌半有伽提羅伽等山日向北行照觸彼山則生熱惱二山之間有須彌留海闊八萬四千由旬日向南行照觸彼海則寒冷也日以天金玻瓈合成宮殿廣五十一由旬正方如宅遙看似圓風吹依空而住日天子身光照閻浮檀金輦輦光照宮殿光明相接而有千光分照傍下月以天銀瑠璃合成宮殿廣五十由旬何故漸現有三因緣一者背相轉出二者青衣諸天常伴月中隱蔽其宮三者日光障奪漸漸而現若日隨月後行至三十日覆月都盡名為晦日若日在月前行月見開淨至十五日具足圓滿日月相望名為望日朔者甦也謂月死而復甦故星者最大寬一由旬小者廣二十里也復有斫伽羅山闊十二由旬楞伽等山併諸海水及與林池空地不及枚舉次復有海名禪那迦闊千由旬百寶間錯海中涌出宮殿七寶合成高十由旬轉輪聖王宮殿隨身此中海道自然涌出與水齊平即金輪王出世有三十二相具足八寶之所輔焉次有雪山高五百由旬四寶所成四面金峯挺出山外高二十四由旬中有高峯眾寶間錯迥然秀出於彼山頂有阿耨達池池東有恒伽河從象口出共五百河流入東海池南有辛頭河從牛口出共五百河流入南海池西有縛芻河從馬口出共五百河流入西海池北有斯陀河從獅口出共五百河流入北海總此四海共一醎味名為醎海中有四大部洲八中洲八萬小洲只一世界耳萬億須彌并諸大海方名大千世界東勝神洲至勝勝神洲廣九萬由旬其洲如半月輪人面亦爾身長五肘壽命五百歲南贍部洲至最勝洲廣七萬由旬其土南狹北寬狀如車箱人面亦爾身長三肘壽命百歲西牛賀洲至妙拂洲廣八萬由旬其土如滿月形人面亦爾身長四肘壽二百五十歲北俱盧洲至勝道行洲廣十萬由旬其士正方人面亦爾身長七肘壽命千歲佛手一肘長三尺四寸今舉中大十二洲其餘小洲該在其中矣依人王經云此南閻浮提一洲十六大國二千中國十萬小國楞嚴云此閻浮提有三千洲正中大洲大國凡有三千三百其餘小洲在諸海中其間或有三兩百國乃至或一或二經旨雖殊當以神契幸勿泥也一界既然而大千同一成壞所有差別舉一以例諸方今以大千總為曼怛隨成一界萬億須彌四天下同時成立於中皆是眾寶所成微妙莊嚴莫不具足而先必仗吽字擁護者是字即菩提心因也以有此字為因恒沙功德依之而生豈獨山洲眾寶而不隨之變現耶又一切魔羅不能為礙故仗之作擁護俾我作法速得成就於中大小二山四洲八中隨念真言一徧手拈花米於曼怛上次第排列應念而成就無有不然也既頓變國土已不可無鎮國之寶故以金輪王八寶而嚴飾之象寶轉輪聖王為太子時年既長大堪紹王位受灌頂時其時夫人於正月十五日手執金瓶取四大海水灌太子頂爾時太子沐浴齋戒受王職位高陞宮殿臣僚輔翼八寶自至王四天下象寶者即八寶中之一也名金剛身此寶能知王意其欲乘時即現其前膚色光白莊飾殊特行步平正其疾如風具足六牙牙有浴池池外有玉女作樂池中之水冷煖隨意此為寶也主藏寶此名大才即文臣也世間文字無不通達先王典籍熟覽無遺綱紀國政輔佐聖君又復能知伏藏隨王所需皆得滿意如王索真陀羅尼唯智臣能解故稱為寶也馬寶此名迅疾風一剎那間周行四天下又復能於一切時中一剎那頃周行塵方不生疲厭故稱寶也女寶此名具妙德端正殊麗有傾國之色肌膚鮮白猶若冰雪冬溫夏凊無大小便能生千子巧慧聰辯適王娛樂有此殊妙故稱寶也將軍寶此名離垢眼即武臣也威猛雄厲有葢世之雄若四天下儻有抗違王制者此寶一至自然肉袒歸降傾心向服故稱寶也輪寶此名無礙行以轉輪聖王灌頂受職之時爾時東方忽有大金輪現其輪千輻具足轂輞金輪寬一由旬眾相圓淨來應王所因知此王定是金輪王於四天之下欽仰聖王望風而化垂衣拱手無為而治般若云王欲游行輪即前導王念飲食輪即停住王意進趣即知所在一時普週威伏一切是稱為寶也如意寶此名光藏即摩尼珠是金翅鳥王之心也圓明映徹能雨眾寶龍得之而鎮海鳥無能害王得之而鎮國百寶具足并士庶熙和萬咸寧稱為寶也寶藏瓶乃貯寶之器又能出生眾寶也日宮月宮前已廣釋眾寶傘即寶葢也王若出入即葢其頂懸處虗空終不墮落尊勝幢即庭前所豎之高幢也建此幢者顯法尊勝人天仰之為宗外道望之而服又幢者幢旗之屬刊定記云幢有七義約之為五一高顯義二建立義三歸向義四摧殄義五滅怖義已上一切供具皆是無上心所成無作法所印爾唵室哩麻忒至捺麻此名佛智隨喜真言上來雖有山洲諸寶尚無宮殿樓閣園林池沼衣服珠玉等故念此真言加持花米徧灑曼怛囉上想所落寶米悉成如上諸莊嚴具如空注雨相續不斷供上師三寶中圍佛會復拈花米向灑虗空念云人天所有種種供物盡世所有一切供養莫不具足已唱曼怛囉真言結蓮花印念梵五供至十二因緣止唱畢持鈴杵於曼怛上緊搖一徧以表洪音振動大千世界此名初獻也寶錯真言凡作印者從右手小指數起施戒忍進禪又左手小指起慧方願力智是為十度方可作印故不錯也左手持於寶錯右手結三尖印想印中赤色吽字出火光念吽吽怛彈指三下遣其魔礙次念唵㰠觀一㰠字徧空然後入觀復想黃色得浪字放光成寶生佛禪押戒度頭施忍進申直結施印亦名普通吉祥印利益有情天寶錯者乃得浪字之所變也經云此字具四種義一多字門即真如不可得義二囉字門即離塵義三阿字門即一切法本來寂靜義四莽字門即一切無我義謂此心若與真言相應能令身心無礙猶如虗空凡有所求最速成就一切伏藏悉得現前所以云因陀羅尼寶能滿眾生希求願故將欲此寶滿我所願當於空性中觀心月輪上光回得浪一念變成寶錯錯之念真言時將錯數下想寶錯內出生無盡諸天如意珍寶等雲間錯雜糅盤旋虗空而奉獻之問前由心月𠶹哩字增長自性成觀音今以此處復觀得浪字而又變作寶生佛一身尚更改不定焉能主法利生也答普門品云應以佛身得度者即現佛身而為說法應以菩薩聲聞天龍八部乃至異類之身而得度者即皆現之而為說法又豈有一定之拘哉不然何得稱為普門示現所以向下作法更易身色處最多如在七寶如來時即現身為七寶如來也散花米真言手拈花米撒於寶錯上以加持之俾用之時令無障礙也上來建設皆從自心不思議變及真言字種之力故有如是妙用既有境界焉無魔礙又彼魔等心行最喜作破法因緣若以正法興盛魔宮隱蔽威德增長楞嚴云若人發真歸源十方虗空皆悉消殞況諸世界依虗空耶故彼魔王及諸鬼神諸凡夫天見其宮殿崩裂大地振坼水陸飛騰無不驚怪凡夫昏暗不覺遷訛彼等咸得五種神通唯除漏盡戀此塵勞豈肯令汝摧裂其處故於三昧之時僉來惱亂禪定令汝正法不得成就俾其魔宮安隱無虞故今行者作法之時恐有境界魔礙與夫天魔及五陰等魔種種魔礙故須遣之遣魔真言三重真言三重遣魔初遣魔從印上赤色吽字出光遣境界魔即違順等境魔次遣魔者從印上四度吽字出火光作搖扇勢而遣諸魔即天魔睡魔病魔死魔煩惱陰魔等三遣魔者從印上十度赤色吽字出金剛𦦨煽空令魔遠離金剛燄者永嘉云般若鋒兮金剛燄非但空摧外道心蚤曾失却天魔膽此蓋就理之言若約事者即如火輪金剛烏芻瑟摩火光三昧也此上智力皆順文釋之若據表法其義轉勝如初登壇則自恃我為法王於法自在隨處建立今恐迷己逐物不達如幻故須遣之所建諸法若不知其自性本空執為實有名為法執復於法中妄計實有主宰名為我執有此二執二障從生上則不能轉依二果下則何異魔外等見梵語魔羅此云殺者能戕害法身慧命劫功德寶故所以初印者表遣我執也以麤易斷故次印者表遣法執也以細難除故二執從遣便證二空名曰俱空若住此空名為理礙故空亦空名遣俱空即當第三印也以不可空處即是真空無住之本一切凡聖之源故次維之以真空印真空呪印至無有間斷念真言時應觀心月輪上有金色唵字此名莊嚴一切佛剎大智大輪金剛三摩地入此定已能從無住本建一切法法句經云菩薩於畢竟空中熾然建立諸法故於真空自性之中默想𠽾阿吽一念頓成十方世界所有天妙曼怛等啞哩干五供猶如普賢雲集供養者正明其供養之心廣也徧空充界者明此供橫徧十方也盡輪迴而無間者顯此供豎窮三際也問三字云何便能成辦此勝事耶答𠽾字如前云莊嚴一切等及佛頂尊勝經云此呪能破一切地獄閻摩羅界傍生之苦回趣善道乃至諸佛淨土及諸天宮一切菩薩甚深行處隨意遊入悉無障礙捨報即生佛剎等阿字者名以菩薩威力入無差別境界亦是無生義吽字者名一切如來菩提心因也亦名一切如來恒沙功德皆從此生總而論之蓋以菩提心為因而入菩薩甚深行處莊嚴一切佛剎及諸天宮微妙曼怛究竟總歸一真實相無差別境界也問四洲諸寶上皆一一具足成就此處又建者何義答從上所作盡屬漸次不能圓具一成一切成并藉真言之力恐失唯心之旨兼三遣恐墮空寂故於一念間從真空自性中想此三字之力剎那頓現一念圓成故後偈云字字密言唯心之所成故知前屬漸次此係一念圓成故無濫也以上建立諸法皆仗因緣而成花米為因真言為緣并及唯心一念想成依此因緣然後有所建立諸法也諸法既屬因緣當體即空雖空不妨現有有常自空縱有當體即空空常徹有空有無礙中道觀也所以中論云因緣所生法我說即是空亦名為假名亦名中道義此之謂也唵啞吽撒華米以成珍寶等供復以三翻曼怛顯密奉獻并祈佛納受而求索願事也諦想清淨至哀納受梵語蘇伐羅此云黃金梵語阿路巴此云白銀寶玉者眾寶之類也梵語麻薩葛斡此云玻瓈亦名水玉即水晶梵語瑠璃此云青色寶內外明徹梵語鉢摩羅伽此云赤珠又云珊瑚琥珀非赤珠即天赤珠紅光互射寶色交輝又名因陀羅寶非世所有梵語鉢摩羅伽隸此云瑪瑙亦名石心硨磲又名大貝珠寶珠者即摩尼珠也我今依教至無間斷此第二獻也三重偈文最極顯著不必瑣釋置鈴於案次右手持花米念云唯願上師三寶至唵啞吽既發大願已皈依三寶請求證明復念三字總持真言撒花米想所落寶米悉成花香等雲而供養之上皆同體三寶此下讚別相三寶等發起眾生欣慕之心成就佛種也志心信禮至萬德具志心信禮者乃精敬之詞也梵語佛陀此云覺覺者謂五住究盡二死永忘如大夢覺蓮花開名之曰佛福足慧足名兩足尊自覺覺他覺行圓滿名三覺圓慈悲喜捨等皆具足名萬德具因窮果彰開導人天曰調御師調乃調伏御乃適時善駕如淨名云閻浮眾生其性剛強難調難伏唯如來以善巧方便設諸苦切之言而教化之譬難化之人心如猿猴故以若干種法制御其心乃可調伏而入律也故名之曰佛天人調御師唵啞吽此無非加持音聲令成廣大讚歎如行願品云十方三世一切佛剎微塵一一塵中復有塵數佛我當悉以甚深信解現前知見各以出過辯才天女微妙舌根一一舌根出無盡音聲海一一音聲海出一切言詞海稱揚讚歎一切如來諸功德海盡於未來相續不斷即此之意也凡聖大慈父三聖六凡之依怙曰慈父經云五眼具足成菩提永為三界作慈父從真界至十方處此下讚現身說法所謂如來從一真法界而騰應化之質若桂月朗空千江頓現悲化之心無處不在豎則窮於三際橫則該徧十方震法雷有警覺義擊法鼓有進策之義廣演權實教三乘權也一乘實也唵啞吽大開方便路經云諸法從本來常自寂滅相不可以言宣今佛於無身中現身無法中說法曲徇機宜隨時設教此所以為開方便也若皈依至地獄苦起信云覺則不動動則有苦果不離因以因生果一念不覺故心動說名為業既有業因焉無苦果若能一念回光便同本得則乘此般若之力何患地獄之苦而不免乎志心信禮至傳東土阿難於西域畢鉢羅窟結集諸經所以云佛法大海水流入阿難心故法華云護持諸佛之法藏也次有三藏法師等翻譯傳於東土易梵語為華言謂之翻譯也祖師弘不與凡聖同纏超然名之曰祖弘者弘開播揚也賢哲判依教修行但未洞徹於心源將近於聖故謂之賢哲判者於諸教之中判分半滿了義之教曰滿不了義曰半字也成章疏至定宗趣解釋義理頓成章疏三乘者聲聞緣覺菩薩也頓者唯顯佛之知見不立階級但離妄緣即如佛也漸者廣明行位三祇熏修角立性相疏決真妄五教者小始終頓圓當部所崇曰宗宗之所歸曰趣鬼神欽至真甘露經云脩多羅教如標月指令人依指而識月也見月忘指切勿認指為月故云標也若皈依至餓鬼苦餓鬼宿因多是慳貪不捨空腹高心由此業因故墮餓鬼而今歸依則摧折慢幢如今聞知則達諸法空豈復顧空花之果聳大我之山哉又何患餓鬼之苦而不能免乎志心信禮至是家務僧伽此云和合眾眾流入海同一醎味眾姓出家同姓瞿曇如水乳合名和合也謂智高才廣行端德隆眾所欽仰名眾中尊五德者一心語不麤獷二說法利人不倦三戒德清淨普聞四能除煩惱毒害五常與佛安住六和者身和同住語和無諍意和同悅見和同解戒和同修利和同均利生為業弘法為務不憚捐軀殞命正顯為僧弘法非分外事也上讚入鄽垂手之高僧下明苦行頭陀之耆宿也避囂塵至採薪薇厭暄欣寂潛避塵世宴坐於幽靜山林之中棲止於巖阿石室之下人天恭敬不以為喜採薪薇以充腹披毳衣以蔽身摶草為褥曲肱而枕以樂道也鉢降龍至相傳付目連六祖等以鉢降龍鄧隱峯聞二虎飛錫空中作聲因而解散西天四七東土二三乃至五宗列派禪教律諸大宗師或以法傳法以心印心如燈傳一燈燈燈相續明明不盡名無盡燈照窮世間無有休息故曰法燈常徧照祖印相傳者此皆以祖師心印遞相傳付也若皈依至傍生苦傍生者謂畜生傍人而生也以僧寶是解脫道一墮畜生則被人之籠繫獵之弓弩漁之羅網庖丁屠割種種苦惱設使飛禽走獸常懷獝狘之悲強弱大小遞相吞噉負力償勞互為徵酬無得解脫一皈僧寶則智慧頓發翻破愚癡之網慈心相向却敵弓矢之手有此勝力又何患不免於畜生苦乎此處可通施主情行者又當激勵大眾發菩提心次則皈依三寶發最上心也眾等發廣大心至三菩提心人天福報三界有漏之因果聲聞緣覺孤調解脫唯求自利不顧本羣權乘即藏通教大乘圓教修六度等最上乘即佛乘也阿耨多羅此云無上三藐此云正等三菩提此云正覺正言發此大願不專為己而求人天小乘菩薩之果願與法界眾生一時同得此無上菩提之道既發心已然後請十方諸佛轉大法輪令彼一切眾生聞此法已然後頓破無明開發其本有之覺性而自然成無上菩提將欲廣迎諸聖大轉法輪必先淨治壇場整肅莊嚴方堪禮請是故次結明王印也先結大輪至呪七徧依教者乃甘露軍茶利菩薩念誦儀教持呪密言令我所作廣大宮殿勝妙莊嚴皆悉成就無諸障礙也默念七徧應想面前空處離身七肘高八肘現一金色𠽾字此字名莊嚴一切佛剎大智大輪金剛三摩地一入此定能變勝妙宮殿當以大千國土合為一國土以此國土融成一宮殿一一莊嚴及諸供具如華嚴云各有阿僧祇數勝妙樂事問上來點淨淨地并建曼怛皆有壇場宮殿及諸供具又何得重複耶答上來所作但是建立似有彼此之分未齊平等之境若不和會融成一土難彰至理所以楞嚴會上世尊從面門上放種種光其光晃耀如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界正表妄想凝結則國土殊分真智一起則法界圓現今融世界亦如是也但除妄想國土自如況藉神呪之力何患而不成也初是翻染顯淨次是從空現假今是融世界而為宮殿令宮殿之量等彼大千廣闊無際重重無盡方堪容受無邊聖賢也既已莊飾宮殿然後迎請諸聖故先伸偈禮請也稽首十方至哀納受稽首者以首至地稽延少時總持能皈三業意起欽承感佛他心通身首作禮感佛天眼通口稱名號感佛天耳通十方調御佛寶也演揚一句法寶也三乘一句僧寶也慈能與法性之樂悲能無明之苦哀納受者正請也奉請三寶至光臨法會此是顯請次則以心光密請既已殷勤三請諸聖豈得不臨當現所建壇儀而奉獻之印現壇儀雖現壇儀意兼密請謂上所建曼怛在於印上一時顯現如印成文不假先後而成也正所謂森羅及萬象一法之所印現而獻佛者正如法華云諸梵天等各持宮殿奉獻於佛勸請世尊轉於法輪之旨同也據建壇儀云若無壇無佛應結纔發意轉法輪菩薩印今將請佛說法須結此印先現壇儀也次請佛念唵斡資囉拶裓囉吽拶吽𠳐斛手作金剛拳施慧進力相鉤相對當𮌎應觀心月輪上白色𠶹哩字放光至色究竟天請智觀音此天是等覺菩薩成佛之處色身最極高大六十四萬由旬菩薩來入道場放無量光先請十方三寶及顯密護神等即普集已互相放光交光相羅如寶絲網輝煌晃耀瑞所希有問凡教中皆以果為主因為伴今觀音放光召請諸佛何以因為主果為伴耶答此有二義一行者以觀音為所緣熟境今先契此境是因該果也二此菩薩是過去威德自在光明如來退位度生雖則示因元果位也觀音本稱悲今稱智何也非智不能運悲故也拶吽𠳐斛者即鉤索鎖鈴之四攝也鉤召也索引也鎖留也鈴適悅也此名四轉輪印若表法而論之即有布施愛語利行同事之四攝法也經云先以欲鉤牽後令入佛智如婆須密女執手抱身心月淨脗脣唼舌戒珠圓約一法而言若同事攝化隨其所作漸漸引入佛智此即同事攝化之鉤義也隨彼求索或法或財而罄捨之終無悔恨此即布施攝化之索義也導以善行令彼關閉諸惡趣門此即利行攝化之鎖義也無礙辯才善巧隨順輭言愛語而獎誘之令其入道此即愛語攝化之鈴義也所以諸佛住世必以四攝而化眾生故回向偈云願我得證無上道以四攝法救六趣也眾誦三十五佛即現十方國土說法度生也毗盧遮那佛至無上輪意明諸佛各於其國出廣長舌相而說法也法而曰輪者何輪者有推碾轉運之義謂轉此法入眾生心中推破煩惱碾碎無明轉凡成聖運至於涅槃彼岸也又曰恒轉者正塵說剎說熾然說皆遮那本願使之然也大眾默念心經一徧此正應轉法輪之意於此必念心經者蓋謂三藏十二分教千七百則公案莫不欲人直下明此心達此心也當體是佛瑞應經云其得一心者則萬邪滅矣又心者喻也如人一身徧體以心為主今八部般若六百雄文蓋以心經為般若爾如云是故空中非但無五蘊等法即諦緣智理出世間法若真空實相之中皆不可得設有一法過於涅槃吾亦說如幻夢故般若如大火聚者也是知此經乃諸佛之母萬行之源若轉此法能度一切苦海菩薩依之修行則能離惑業苦究竟證無住涅槃三世諸佛依般若故得無上菩提以此觀之出生死入涅槃由斯道也大哉心光智不能知識不能識謂之大神陰陽不能籠謂之大明更無有超於其上者謂之無上非但一切諸法不能與等且能等一切法等一切生一切平等無有高下謂之無等等呪能除二種生死苦轉依三德祕密藏真實不虗復說密呪以助顯焉有此妙利超勝餘經若有聞法者無一不成佛以滿上來所發大願云法界眾生一時同得菩提之謂也華嚴云身為正法藏心為無礙燈照了諸法空名曰度眾生啟告十方至無量聖賢此一文之中正敘施食本意原始要終分為四段此六句正啟叩聖賢矣我今某甲至異類鬼神此申己意以慈悲心仗佛威神之力召請六道眾生也唯願諸佛至悲增護念此願諸佛聖賢舒大威光興悲愍心護念於我令我隨心得滿願也普願十方至證無上道此正申其施食之願如此也普願法界眾生於此時中乘如來力決定降臨享餐甘露發廣大心離惡苦果證無上道利樂一切有情也俟後當陳五供以圓滿第三獻也十方一切剎至哀納受此從心間𠶹哩字種放光出生六箇吽字各具一色花淡紅色表布施令人生歡喜香黃色表持戒令業行芬馥燈紅赤色表忍辱轉瞋恚火成大光明塗白色表精進潤澤法身果紅黃色表禪定成就佛果樂青綠色表智慧能出生種種法故此六天母皆以六波羅密為體一面四臂上二手各持一供下二手輪相交窈窕美貌展左跪右而作舞勢奉獻諸佛間以三字呪者加持諸供令徧滿恒沙諸國土也因緣自性至三麻曳吽因者各有種子緣者藉事顯發自性出生非外有也復念真言結印者別彰華梵顯密云爾問果有此天母耶答此之天母乃喜金剛中圍內有之皆佛母文殊普賢之儔也皆從毗盧智用流出即前三十七尊內數也問塗是何物答是水也何不直稱曰水而曰塗者何也如恒河水魚龍見為窟宅天人見為瑠璃人間見為波流餓鬼見為猛火本是一水所見各別故取名亦不同也今能獻之人是天故所陳之水彼稱為塗也我以普賢行願力至皆供養此出華嚴經普賢廣修供養普徧塵剎禮拜供養諸聖賢也既欲修此供養如普賢之行願普週法界必當運其一心然後方如法也上來諸供皆非法供即當用心方為法供也淨名云諸供養中法供養最又行願經云縱有種種供養常供於佛不如法供為最法供者即菩提心也何以故以諸如來尊重法故若諸菩薩行法供養其功德不可為喻又般若云若以一食及一衣花米瓔珞燈燭幢旛等供養於佛各如恒河沙數諸佛及僧當學般若波羅密般若者即實相般若是本具心光也以供養功德在心不在事若以一食大心悉供十方諸佛不以遠近為礙是故諸佛皆見皆受所以世出世間無過此心為最萬善普會千聖共揚若運之以作供養是名真如法供養也次結運心供養印誦真言時應觀印上有金色唵字即法身真理流出人天所有妙塗花香燈明幢旛傘葢鼓樂歌舞真珠羅網懸諸寶鈴華鬘白拂微妙磬鐸矜羯尼網如意珠寶樹衣服之雲天諸厨食上妙香美種種樓閣諸天嚴身頭冠瓔珞如是等雲行者想滿虗空以至誠心而為供養我以志誠心至遣魔印此繼之以施主家三山斛食而供養之以顯非廢事專理獨擅觀門也先結三尖火輪印誦真言時應想掌中有赤色吽字三脚放光從三尖出作搖扇勢遣食器魔問食有何魔答以食有尋香施食等魔故遣之我以佛神力至虗空界以欲變空先申此偈問既是萬法隨我使之有無一切不能有無於我何得又言承佛神力方得此食徧滿也答若非諸佛不思議力焉能隨心轉變化有歸無從空現假耶當知神力者即呪中之㰠字也此㰠字名一切如來正覺不動智變化金剛三摩地一入此定則不動本智契本覺真空無相之理中道觀也所以正覺者無分別理也不動智者無分別智也金剛者喻能斷惑也以金剛能斷惑故空觀者變化也謂化有歸無從空現假假觀者舉一即三言三即一故曰三摩地也變空印誦真言時觀一白色㰠字飛在食器上使其頓空極令清淨如火燎枯草滅盡無有餘於其空處應觀三箇金色𠽾字變成七寶鉢盂盂中有白色唵字流出勝妙飲食皆乳酪醍醐及蜜等淨味默念唵啞吽二十一徧加持極令廣大正應偈中云加持甘露食徧滿虗空界復伸四轉輪印拶吽𠳐斛想前來所請三寶海會分明顯現再伸五供施寶錯運心等印呪將上次第所成諸供於此一時而奉獻之想三寶歡喜攝受問要空此器及食者何也答食乃欲界段食器即銅錫瓷木等器諸天尚厭況世尊乎今則遣其麤而變其妙方堪奉上諸聖賢也次則結印而奉獻此食以此甘露食至奉食印此以二手作掬水勢而捧上來七寶鉢盂貢獻甘露每念真言一徧各彈指一聲初一分奉佛并法次一分奉菩薩聖僧後一分奉顯密護神以表一彈指頃持一食而徧供恒沙諸佛耳并取警覺去塵義如法華云謦欬彈指聲震動大千也次振鈴念奉食偈仍分三分求索願事奉食後復讚者正明三寶是人間最勝福田應受人天供養也我今奉獻甘露食至圓滿一切智世尊者十號之總稱大慈者萬德之首也妙相莊嚴者即百福莊嚴相也明解者謂世出世間無不了知法華云如斯之事如來明見無有錯謬約如理智也楞嚴云松直棘曲鵠白烏玄皆了元由乃至恒沙界外一滴之雨皆知頭數此約如量智權實並施故云圓滿一切智也上句歎功德屬福足下句讚智解屬慧足兩足既尊應受人天供養應作四生師範故能施福慧也能施福慧至我讚禮應施福者與之福應施慧者與之慧猶如大海脩羅飲之亦飽蚊蟲飲之亦飽不以百川普會而增不以萬派裂分而減不以魚龍鼓之而濁不以珍寶聚之而清又應時而潮知機而化故喻之如海也具此最勝一義故諸如來我讚禮也自性本體至脫惡趣自性者即法寶自性也法有教理行果謂法體上本離欲染猶如蓮花處污泥而不染即理也若依此理即教也而起諸波羅密即行也則能永脫惡趣速超道果即果也良以眾生貪瞋熾然障蔽自心故起諸業羈滯三塗今修六度則能對治貪等諸業以對治故則三界因亡四生果絕所以能脫惡趣也又云自性離欲者何論云於真如法勝解現前所修離相以知法性本無慳貪隨順修行檀波羅密以知法性無染離五欲過隨順修行羼提波羅密等是故必須先悟自性清淨然後修行則一修一切修一斷一切斷一證一切證根本既清則六度萬行不修而自圓以本體具故依此修行又何惡趣而不免乎以為甚深至我讚禮此之理趣甚深微妙即理與行稱為法寶於彼妙法我讚禮也解脫道中至堪恭敬三乘四果稱為解脫而大乘菩薩超勝彼等故云勝解脫也此是聖僧戒定嚴身六和自備守護律行如護明珠能作後昆之模範堪受人天之供養故云堪恭敬勝妙福田至我讚禮此是凡僧以僧雖有聖凡之別皆是紹隆佛種之人如影響眾生與聖僧俱生如常隨眾住處與佛同住應供於龍宮天上說法於王宮內院有如是德故我讚也既稱頌矣想三寶歡喜攝受求索願事必蒙允許自我及法界至此而止於中乘大願力而修三密建壇設供總名福慧雙修也夫建壇設供本乎行願屬作福門自利邊事若入觀音大悲剎那禪定則能長養悲智成就利他事也有福無智恐墮人天因果故當修此禪定則有智矣故經云因依禪定得無漏智既具福智等同諸佛然後於法界之中能作廣大利益是故此定宜當入也自此已下總名大悲利生分故先舉偈云普陀洛伽至觀自在普陀洛伽山名也乃菩薩入定之處隨緣赴感即普門示現有叩皆應無剎不周一稱其名皆得離苦如洪鐘在架隨扣擊以無虧月映寒潭處波浪而不散此所以為觀自在前稱觀世音此名觀自在者何也自在二字總二利而彰號一自利二利他自利者謂菩薩用般若空慧照了心色清淨圓融事理不二此自利也復念眾生八苦所逼不知出離隨類應機說法度脫令其皆得自在此利他也由自利故發智德之源由利他故立恩德之事成智德故則慈起無緣之化成恩德故則悲含同體之心以同體故則心起無心以無緣故則化成大化心起無心則何樂而不與化成大化則何苦而不收何樂不與則利鈍齊觀何苦不收則冤親普救斯乃菩薩之大慈大悲故稱自在耳問既云在定云何能赴感度生既言常在又焉有出入之理乎答此定名所作定即剎那大悲定也古訓劫波是時之最長剎那乃時之最促如壯士執利劍斬一籰絲每一絲上有八十剎那則時促可知矣既曰時而迅速若此則此時者乃無時之時也正明無時而不在定即那伽常在定無有不定時之性定也既性是定焉有常與無常出之與入然何妨於出入畢竟出入無礙去來自由順逆不干其懷動靜不失其照始稱自在禪定所以終日在定無時不應機雖常應機未常離本定故華嚴云佛身充滿於法界普現一切眾生前隨緣赴感靡不週而恒處此菩提座又云清淨妙法身湛然應一切淨名云不起滅定而現諸威儀即此之謂也南無無盡至微妙身南無者承順之詞菩提心者即覺心也三世十方一切諸佛無不先發此心而後滿行證果我今欲起行利生故亦承順三寶而誓發此廣大心也既發是心矣惟願菩薩慈悲攝受令我速證聖身心便興慈運悲行行利生而無障礙也此四句乃歸敬請加之意次入觀音三摩地表白舉令行人知時也梵語三摩地此云等持即平等任持之意亦名正定謂不偏不倚之謂正不昏不掉之謂定亦云正受不受諸受是名正受如大火聚名觀音三摩地者此定名大悲剎那定入此定時能於剎那間普利羣生也澄心閉目觀心中澄心者即入止也謂止其心如碧潭澄水湛然不動即內心不起也閉目者即運觀也謂收視返觀心月梵字不復緣於餘境即外緣不入也祖師云內不放出外不放入心如牆壁可以入道問何故先澄心而後閉目耶答謂境由心現心因境有二者相因故令妄想之波念念不斷今欲達境唯心故先澄其心則境無因矣後閉其目則心無託矣各住法位當體無生始名為定故楞嚴云於外六塵不多流逸旋元自歸塵既不緣根無所偶返流全一六用不行十方國土皎然清淨譬如瑠璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍圓滿皎潔淨月上自性本來圓滿皎潔若秋月之無雲圓而滿則無德不備皎而潔則無照不週體用之別也字種放光成蓮花謂自心月上有金色𠶹哩字放光增長成蓮花此字乃大悲菩薩取證真理利生妙智又從光而證者何也楞嚴云爾時世尊從肉髻中涌百寶光光中出生千葉寶蓮之謂也肉髻者表最上頂法也百寶光者表心光普照也蓮花者方因即果處染常淨喻圓頓法中初發心時便成正覺但離妄緣即如如佛是也花中有一觀自在此是字種增長自身所成之觀音也初從理起事事有依中現正正中現依普賢現身毛現樓臺諸佛栴檀塵中現佛菩薩幢旛等雲是其事也相好具足無比對此稱讚之詞也偈文太略應說一面二臂其身金色花冠瓔珞頂戴彌陀嚴好殊特無與儔侶而並對也左手執持妙蓮花左手表實智無分別故執持花香實相無相巧喻蓮花表實相契實智理也右手於葉作開勢右手表權智有作用故於葉者謂花開蓮現表因花既敷果德自彰也作開勢者謂開權顯實見究竟果也若逐一表之則金光明疏云法性身者非是凡夫二乘下地之所能見唯應度者示令能見此即無身之身無相之相一切智為頭第一義諦為髻八萬四千法門為髮大悲為眼圓通為耳中道為白毫無漏為鼻十八空為舌甘露為口四十不共法為齒弘誓為肩三昧為腰如來藏為腹權智實智為手定慧為足如此等為莊嚴法身也上皆自覺下是覺他行菩薩行也菩薩思惟至之蓮花謂此覺悟之花人人本有箇箇不無一切眾生無不各具與諸菩薩本是同體如何迷頭認影懷寶迷而不自覺誠可悲愍如世尊覩明星悟道之時讚歎曰奇哉眾生具有如來智慧德相皆因妄想執著而不得證若離妄想無師智自然智皆悉現前我當為彼而開導之此中思惟即行者思惟不可打作兩橛何者所證理同也各具者如經云知一切法即心自性成就慧身不由他悟之意也清淨法界無惑染蓮花是喻清淨法界是法合耳謂一真法界本來清淨一塵不立無有煩惱惑染如蓮花之不著水也六祖云何期自性本是神變何期自性本自圓成何期自性本自祕密等八葉各有一如來自此至晃耀五句通自他說約他則言一切眾生平等共有此花與如來入定向觀自在約自則言行人與八如來同時入定也以上蓮花不曰八葉至此而獨言八葉者何也八葉表八識也一花表一心也八葉總是一花八識總是一心上來菩薩已轉識成智唯是一心故不曰八葉今眾生不能掀翻識海截斷情流歸於心原八識熾然故此獨出八葉也各有一如來者起信論云依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿黎耶識此識有二種義能攝一切法亦能生一切法云何為二一者覺義二者不覺義不覺有本末之殊覺有始本之異本覺為如始覺為來始本不二名為如來此獨第八識有此義從第八識復轉起前七識楞伽經云藏識海常住境界風所動種種諸識浪騰躍而轉生藏識既具則前七識亦具如來之義故經云眾生身中念念有如來成正覺般涅槃又云一切眾生即菩提相何也謂若一念緣起無生是人與佛何殊其或識情不斷即此號曰眾生斯蓋就機而說若約行者已轉八識成四智四智皆能現身說法有如來義也如來入定至觀自在如來面向菩薩者謂此菩薩即過去正法明如來以故不分主伴又蓮花即因果同時而菩薩亦因果同時也花是因蓮是果今果尚有菩薩即因該果海也花上有如來即果徹因源也萬法顯必同時一際理無先後冥真體於神化之域彰德相於重玄之門自非竿頭進步絕後再甦焉能測如是之境界也入定者即同行者所入之剎那大悲定也問既曰面向前四面可後四得不背也答謂圓通之身本無背向如雞犀枕面面皆正豈同眾生分段之身向東則背西面南則背北如大通智勝佛坐於道場諸梵天等東看則曰在西南觀咸曰在北寧有一定之向哉知道者更須向無向背處看項珮圓光至及晃耀上句彰殊勝身下句彰殊勝境若在法上明眾生心從本以來具無漏智炳煥靈明洞徹不昧經云世尊語金剛慧菩薩言我以佛眼觀一切貪欲瞋恚愚癡諸煩惱中有如來智如來眼如來身結跏趺坐儼然不動善男子一切眾生雖在諸趣煩惱身中有如來藏常無污染德相具足如我無異楞伽云如來藏自性清淨轉三十二相入眾生身中為蘊所覆煩惱所纏臨濟云有一無位真人在汝赤肉團中放光動地正明即眾生心中有如來智慧德相故云無一眾生而不具有如來智慧德相上十四句總顯理事二種法界下二句方入理事無礙法界次想其花至虗空界次想者欲行人以三昧光照彼心花令其心開意解即得以理相應其花舒大者以事攬理成故能漸舒大理隨事變故能徧法界未有事不依理故隨理之事一一如理圓滿遂令一塵普徧法界時諸塵皆徧一多無礙大小相容此是理事無礙法界思彼覺華至共廣大思彼本覺之華光明朗照窮十法界元是一真與如來海會同時廣大更無二致也何謂如來海會有無量光明徧照法界令彼諸覺花亦能徧照法界互無障礙交涉重重如一室千燈光光無雜此事事無礙法界也心若不移至諸眾生上句自覺下句覺他上來思惟即是起行心若不移此定遂能興無緣慈運同體悲愍諸眾生起於哀救即是利他行也何以故以諸眾生懷寶迷持珠乞丐本自是佛迷而不覺枉入諸趣我今證此廣大無礙境界當以慈光普照令彼頓悟無明實性即佛性幻化空身即法身如類我也覺花蒙照至觀自在彼之覺花果蒙吾光一照如千年暗室一燈能破當下永脫苦惱心花頓開覺地圓淨便同菩薩無差別也蓮花漸收同己量上八句皆舒此一句獨卷約密說即是增長究竟準余已現前解云從正位起名增長復歸正位名究竟亦名始本不二也上師云有放不收同凡夫有收不放是二乘有收有放名祕密境界収放總不同名無戲論法此乃最極本續也正表吾人自性縱橫自在舒卷天然儒云放之則彌六合卷之則退藏於密矣復結自在至觀自在以前乃是定中境界今復結印者正請智佛冥熏加持四處今我父母所生之身頓同菩薩堅固不壞之金剛身也又前既現觀音今恐迷己逐物當復回觀自身故云亦等問最初既已字種增長令成觀音何故今又加持耶答初表增長由未離覺今是親證親入也前所觀觀音望因則名因中果加持之後當體即果中因也問登座即頓起觀音慢今復何故又入此定豈不濫耶答前是根本定亦名正位亦名正體如在家為人也此復入定如在為臣也其實一體而約處別也如在戎則戎衣在朝則朝衣故根本定白色所作定金色向下一一作法多有更改身色當以此理鑒之問分明加持五處云何只言四處者答初登座時即頓起觀音慢以心間𠶹哩字中增長觀音體故不離𠶹哩字是本體義具足無漏法及至下座方纔不現故不言五處也四處者頂口喉臍是也當觀吽字加持頂是真如功德義用此加持無能淩屈次觀唵字加持口是如來相好義次觀阿字加持喉是語莊嚴種種義次觀覧字加持臍能令身心清淨皎潔如水如是加持何患身心不同菩薩無漏之體也以此禪定至廣大願此四句將自己之功德而回施法界眾生同生西方見佛聞法成就徧吉菩薩廣大願力也若人欲了知至惟心造前來入定鑒機之後諦觀三界無安猶如火宅一切眾生身為八苦所逼心被煩惱酷熬求暫停捨了不可得眾生本來與我同體未有我安樂而彼輪轉故當興慈運悲乘定力而救之是以稱誦伽陀示其出要之道三光並照直徹長夜昏衢梵音演處地獄頓空神思遊履苦輪停息頓使鐵牀銅柱當體全真博地凡夫同御寶乘故經云善哉見諸佛救世之聖尊能於三界獄免出諸眾生今欲破獄救彼眾生先伸華嚴經偈此偈意正明唯心之旨古人云阿鼻依正常處極聖之自心諸佛法身不離下凡之一念能達性空之理諸苦自然不及但了性心現量禪天之樂何殊所言苦者假設之詞設使有人而欲了知三世諸佛何得而成應當觀察法界之性以真如體本來無凡聖之別因隨緣故作業有異所以十界昇沈六道不等何則若真如隨無明緣而造染業則感六趣之報若真如隨不思議緣而修戒定慧業則登四聖之果故曰一切唯心造也經云三界無別法惟是一心作宗鏡錄云應觀法界性者則真如理觀也一切唯心造者即唯識事觀也以理觀唯識之性諸佛證此為成佛之體以事觀唯識之相眾生達此為出要之門良以一文之妙攝義無遺一偈之功能破地獄纂靈記云有京兆人王明幹本無戒行曾不修善因病致死被二人引至地獄門前心念地藏菩薩乃見一僧人教誦偈云若人欲了知三世一切佛應觀法界性一切唯心造菩薩授記已謂曰誦得此偈能破地獄苦其人誦已遂入見王王問此人有何功德答云唯持一偈具如上說王遂放免當誦偈時聲所至處受苦之者皆得解脫三日乃甦憶持此偈向道俗說之參驗偈文方知華嚴經中無量菩薩雲集覺林菩薩所說之偈意明地獄心造了知心作佛地獄自空耳故知若觀此心不唯離苦不唯破地獄界乃至十法界一時破盡以入真空一際法故次結破地獄印結印誦呪增長自心成紅色觀世音心舌印上三處皆有紅色𠶹哩字放光如日初出之狀三光同照阿鼻地獄彼蒙光照悉皆破壞觀佛三昧海經云是時佛心如紅蓮花蓮花葉開八萬四千諸白色光其光徧照五道眾生此光出時受苦眾生皆悉出現所謂阿鼻地獄十八小獄八寒八熱乃至百億刀林等獄皆悉破壞今行人亦當效此觀也問一處放光足以破之何用三乎答為彼眾生三業妄造而成此獄故今亦用三業放光以破之也又問地獄是眾生別業而成云何能破答雖云別業同是一心以智照之眾生尚無況地獄乎由迷一心妄造眾惡報在地獄妄見受苦譬如夢中為彼虎狼獅子所噬或為賊害或遭王難受種種苦及至於醒了無所得今觀地獄受苦亦復如是假以智照之力亦無有不破也問地獄既然本空何得破而救之答我雖以智照知其本空彼無智照焉得不苦圓覺云夢時非無及至於醒了無所得今正欲破此地獄及苦空也誠知諸眾生以惡業因緣而成此獄則實非本有矣我今以智照因緣而破之一禪定二手印三真言四作觀五智照有此五緣何事而不辦耶豈唯地獄即三界二十五有亦皆破矣今時學者濫稱闍黎唯是音聲嘹喨振鈴擊節慮恐負於請主之意多矣由此印呪至豁然自開真言呪印威神之力不可思議也次運心執爐而請奉請地藏菩薩至臨法會破獄之後然後請者何也以此菩薩是幽冥教主又三界總是一生死獄菩薩示生三界得三界空然後成佛常在獄中教化眾生是故先破令空方運請也請已當伸四轉輪印念五供施寶錯運心等呪而供養之此處宣祖宗亡靈附薦等疏次承毫光召請十方眾類孤魂先逐一列名次振鈴歎悼名為顯召若鬼住處在南贍部洲下五百踰繕那有琰摩界是一切鬼住處若依楞嚴鬼等住處在水輪之下火輪之上地獄又在風火交過之地自此已下即八大極底名阿鼻也梵語捺洛伽或云泥犂此云苦極即地獄之總名耳一心召請至西來戰艦即晉王濬王渾伐吳事有詩曰王濬樓船下益州金陵王氣黯然收千尋鐵鎖沈江底一片降旛出石頭人世幾回傷往事山形依舊枕寒流從今四海為家日故壘蕭蕭蘆荻秋北去鑾輿即北宋時金遼虜徽宗欽宗舉族入沙漠遂卒於五城國杜䳌此鳥名昔蜀望帝因貪色誤入武臣家被臣幽禁一心思歸遂化一杜䳌從口而出飛在桃枝上詩云嗁得血流無用處是其事也三王即禹湯文武五伯即齊桓晉文秦穆宋襄楚莊今曰前王後覊不止此等而已築壇拜將即韓信常與蕭何語何奇之信在漢漢即高祖初或小覰韓信委以輕職詎時未利而僨其事自度王不用乃私遁去蕭何自追之王曰諸將亡者眾而獨追信何也何曰諸將易得若韓信者國士無雙王乃築壇拜韓信為將後伐楚得功封為淮陰侯復封齊王建節封侯昔班超有大志家貧為人傭書久受勞苦投筆歎曰大丈夫無他志略猶能效傅介子張騫立功異域以取萬里封侯安能久事筆硯間乎後平西域封定遠侯力移金鼎大禹所造即伍員投吳三舉金鼎其色不變後果伐楚身作長城萬里即宋朝檀道濟自騖文武全材國家倚賴文帝疾義康矯詔誅之道濟見詔憤怒氣盛目光如電脫幘投地曰今日此舉乃壞汝萬里長城也霜寒豹帳武將立營荒郊常懸幔帳每於其帳上彩畫豹以示威也風息狼煙古制十里一營皆設煙堆儻朝中有不測之難遞起煙騰諸國皆知頃刻萬里所屬之地皆悉興師救護又凡三軍出師至晚駐劄所打營火之煙是也五陵陝西漢陵寢在焉又金陵巴陵廣陵茂陵武陵皆地名也蓬萊之島蓬萊山在東海中六帖云銀宮金闕紫府清都人鳥絕跡是神仙居住之處探花足步文林進士杏花初宴謂之探花使少俊二人為探花使徧游名園採取名花若他人先得則花使不免罰焉射策身遊棘院射策謂投策也難問擬議書於后策列而置於案上使不彰顯在試者意隨其所取得而擇之以定優劣上者為甲下者為乙棘院即應試場也螢燈飛散車胤家貧至夜攻書無油以囊螢火為光而讀之鐵硯磨穿五代桑維翰初舉進士座師厭桑與喪同莫之舉遂作日出扶桑賦或勸其改業翰則鑄鐵硯清洲以熟鐵為硯甚發墨鑄此鐵硯而示人曰硯穿則易他業後遂及第七尺紅羅即銘旌也以死者不可別故以旌書識之穎達疏云士長三尺大夫五尺諸侯七尺天子九尺愛之以錄其名敬之以盡其事杜牧之詩云黃壤不沾新雨露粉書空煥舊銘旌白牯黧奴南泉云三世諸佛不知有白牯黧奴却知有白牯者即水牯牛喻禪也黧黑色奴即貓貍之類却知有者教有苦空之談禪有直指之說黃冠野客羽服仙流唐李湻風之父名播仕隋棄官為德士自號黃冠子唐太宗時有仙人譚紫霄帝寵之出入金門無阻賜號金門羽客由云羽人王子年拾遺記周昭王假寐夢白雲中一人服皆羽色王求仙術受絕欲之教因名羽士桃源洞在終南山閬苑洲在蓬萊畔即彼修真養性之處三花即精氣神也九煉即七還九轉之法道家以金鼎烹食吐故納新為內丹銷煉五方金石使其致柔為外丹合九十晝夜從寅至申為七還也羊腸之險泰行山路險猶如羊腸九曲漠漠黃沙古之戰場詩云漠漠黃沙際碧天問人云此是居延停驂一顧魂堪斷蘇武爭禁十九年鸞鳳和鳴夫唱婦隨熊羆叶夢詩云吉夢如何維熊維羆維虺維蛇太人占之維熊維羆男子之祥維虺維蛇女子之兆羆似熊而長頭高脚獃憨多猛力能拔樹熊羆者是陽物所以為男子之兆虺蛇者陰物也所以為女子之徵奉恭欲唱乃註生神前二童子名凡妢娩時彼唱則吉不唱則凶璋瓦未分蜀江津有天泉池邑人春日遊此競於池中摸石求嗣得石者生男得瓦者生女又毛詩云乃生男子載衣之裳載弄之璋乃生女子載衣之裼載弄之瓦宇宙天地四方曰宇往來今古曰宙金谷園在洛陽橋北逸史云梁氏女有姿容石季倫名石崇以珍珠三斛買之因號綠珠後孫秀使人求之崇不許謂珠曰我為汝得罪珠曰當效死君前遂死此園馬嵬之驛唐玄宗有楊貴妃被安祿山謀叛逼妃死於此驛薜茘多餓鬼之異名也魑魅魍魎此物之怪也俗書云山澤之怪謂之魑西京賦云山神虎形曰魑宅神豬頭人形曰魅魍魎者木石變怪也玉篇云水神也華胥列子黃帝晝寢夢遊華胥之國既覺怡然自適其後天下大治儼如華胥之夢映雪偷光孫康家窘映雪讀書漢匡衡少貧好學至夜鄰家有燭鑿壁偷光深明經術每說詩解人頤五姓世間之姓奚啻萬家禪波羅密經云即五音也謂一切姓之音韻文字總不出此五音攝末歸本故言五音宮商角徵羽即五姓夫如是則盡世間之姓該攝其中矣以上皆本文昭著不復細釋故但出事跡而已顯召竟我以大悲至餓鬼印此是密召先偈次印以左手作無畏勢慰其弗懼也左願上有月輪中有白色𠶹哩字放光至閻魔界勾攝一切有情右手四度微曲進度勾召來入道場遶佛三帀作禮而出壇外分四門東門至南門地獄眾南門至西南隅餓鬼眾西南隅至西門畜生眾西門至西北隅人眾自西北隅至北門脩羅眾自北門至東門天眾應當如是而安住之故曰方以類聚物以羣分也既召請已至令離苦趣既召文畢讚善激勵其思法也主者撫尺一下誠慰施無畏之意既召請已復召其罪性入金剛掌汝等諸佛子至次結召罪印勾罪經云自身觀自在菩薩心月輪上想白色𠶹哩字放出火光如勾入彼身中口誦密言勾攝一切有情并自身三惡趣業其罪黑色猶如煙霧而合入我掌中變成諸鬼形又金剛頂瑜伽念誦儀云於進力度端各想一𠶹哩字出光勾攝自他身中所有障罪誦密言時想彼罪障如鬼黑色髦毛髼豎二羽各齊想勾攝彼罪入於掌中結成罪山問罪無實體云何如彼煙霧耶答雖無實體却能充塞天地障蔽心目不能得見諸佛清淨境界今借諸霧為所緣境實有益於事也既召入掌必當為彼而摧破之先伸偈云摧罪諸惡業至摧罪印摧滅罪障與諸惡業猶如劫火洞然之時菩薩以大威力一唾即滅然劫火雖滅一噓猶能復生我今以金剛杵摧碎彼罪山當體如微塵永不復合也勾罪經云自身增長四面八臂觀音前面青色右黃左綠後紅想心月輪上青色𠶹哩字放光照前六道所召之罪結成罪山前兩手結摧罪印左願上怛囉字是離塵義右忍上吒字悟一切法性不可得義並金色名菩薩入甚深般若波羅密門右第二手持杵表摧滅一切有情法破煩惱軍故右三手箭表能穿破諸苦惱故右四手劍能斷一切憍慢鎧故左第二手持鉤表鉤出有淵所居故左三手弓表發智機應當度故左四手絹索攝取一切所應化故身出火光坐日輪蓮花足踏烏麻怖畏誦呪時二中指搖動至後一徧拍手作聲觀彼罪山如瓦塔而倒問罪無實體云何摧耶答正謂之無故今摧之若決定有不能摧也其業障亦有二種一者業障二者報障其業障中復有現行種子其現行種子之中復有定業不定業二種今摧罪真言正滅不定業也偈云自身觀世音莊嚴極威猛四面各變色青黃綠紅整八臂形現間有印手俱秉杵箭劍右列鉤弓索左儆蓮花日輪坐足踏烏麻影梵語烏麻怖畏此云白澤神獸澤音鐸大論云其形體白紅燄方頰大骨眉高而廣口鼻方正利爪尾長膚色光潔似麟無角似龍身短有大威力也定業不可轉至定業印上來召摧皆滅不定業也尚餘有二種諸佛出世不通懺悔之業今當破之偈云決定之業理固難轉今藉禪定印呪觀想之力遂能轉彼無始障難與一切罪業當下消滅如湯消冰也當想自身於心月上觀青色𠶹哩字出光照諸鬼眾所有定業當下消滅應想自性清淨本空心佛眾生三無差別是名破決定業也大乘千鉢經云諦觀心鏡照見心性唯照唯清唯照唯淨徧現十方廓週法界朗然寂照無有障礙迦葉佛偈云一切眾生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福罪性本空至懺悔滅罪印上來不定與定業悉已破之未及於彼發露懺悔先申偈文令知懺悔之方若論罪福之性本來空寂皆由汝之妄心造作妄心若滅罪相奚存如毗舍浮佛偈云假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅心罪兩妄當體真寂真如體上一切罪障如紅爐點雪欲覓罪性了不可得非但懺悔罪障即無始根本無明亦從此截斷矣故曰智者能知罪性空坦然不怖於生死如是始名真懺及與理懺也念真言時自身觀自在菩薩應想二屈指上并心月上有白色𠶹哩字放光入彼法界有情身中如日爍露之狀罪垢消鎔猶如墨汁從足流出滲至金剛際問前已摧破今復懺者何也答前時召摧皆有三密之力摧滅罪性至此方是於彼發露懺悔謂自此懺悔之後永不復作也罪屬黑業故以墨汁表之自召至此是滅業障竟諸佛子等至無有餘文顯不釋一滴清涼水至施甘露印以上業障雖滅報障猶存如本罪人雖超其罪甦其刑罰而身形𩑔瘦容顏憔悴兼之久困牢獄身體飢羸當施之以湯藥飲食方盡惻隱之心今則身雖無罪報障未轉故此以甘露施之正欲除其報障也月密明點本并蘇魯巴本續云自身想觀自在菩薩心月輪上白色𠶹哩字放光照前鬼眾并右忍指上有一月輪輪中有白色錽字流出甘露如水銀色是真智所成左手力智點水彈洒虗空如細雨而下觸此水者悉具色相猛火息滅普得清涼離飢渴消滅心報障汝等自從無量劫至離諸障難業火已息復具色相而咽喉究竟未通故當與彼而開通之先申偈正申其閉塞之由謂汝等自從無始以來廣造惡業起諸慳貪我慢邪諂空腹高心由此等業故墮餓鬼腹大咽小所以千萬劫不聞漿水之名二六時中唯受烈𦦨之苦我今持誦密言令汝咽喉通達無礙所受之食得上法味不復變為膿血鐵糜也應觀自身觀自在菩薩心月輪上字種放光照諸有情想左手掌中有青色𠳐字變成青色蓮花花上有白色阿字流出性水極甚清涼右手忍禪點水彈洒虗空彼諸有情觸此水者咽喉自開通達無礙便能出聲接如來名此一段是滅報障竟問已前俱用𠶹哩字至此又用阿字何也答阿字是語種故以三本續用之也南無寶勝如來至悉皆消滅以前來業報既盡復為彼等稱讚七佛名號令其聞名覩相永離苦海究竟常樂之意也涅槃云聞常住二字尚七世不墮地獄況如來萬德者乎華嚴云設聞如來名及所說法不生信解亦熏成種自然成佛如人食少金剛云云問七佛還有前後優劣者乎答佛佛道同無有優劣所謂語等字等法等身等是也前後次第者以諸佛因地各有大願利益眾生故以此功能列之當前者前而後者後也初以離苦趣業火未息故先藉寶勝如來名號令彼得聞沃滅業火聞此佛名即能滅塵勞之火也南無離怖畏如來至清淨快樂業火既已停息方離幽暗之處乍覩光明之境人天混聚凡聖交參不無驚怖之狀故次以離怖畏如來名號令彼聞之便得永離驚怖常得安樂南無廣博身如來至得甘露味恐懼已息針咽永透故稱此如來名號令彼聞已一聆洪名壅塞門開業火永熄清涼通達所受之食不復變為鐵丸銅汁也南無妙色身如來至最為第一雖食甘露而色相猶然不滅當稱斯佛名號令彼聞矣一聆洪名便得不受醜陋而得相好圓滿到此方脫鬼畜形也南無多寶如來至受用無盡色相雖具而衣冠不整受用乏少復令彼聞如來名號便得莊束整齊財寶豐足稱意所需也南無阿彌陀如來至入不退地既已適其所願恐在閻浮信心難堅又不能常值諸佛親承供養雖蒙法化難階不退故稱彌陀名號一聞其名即得往生極樂世界蓮花化生而入阿越致地也南無世間廣大威德自在光明如來至如瑠璃珠復稱此名號者所謂統眾德而大備爍羣昬而獨照一歷耳根遂得五種功德設在世間世間中尊如悉達初生即曰天上天下唯我獨尊又不受異生之身相好端嚴威德廣大如太子墮地貴壓羣臣又有大自在力所向如意飛行自在無諸阻礙又得金剛不壞之體具大智慧之因身心明徹如瑠璃珠不歷僧祇頓悟法身具此等義可謂盡善盡美矣此滅煩惱竟諸佛子等至無上道此總言七佛如來誓願廣大拔濟眾生離苦得樂若一稱名便能千生離苦證無上道救餓鬼經云佛告阿難若人欲求長壽福德增榮滿足檀波羅密每於清晨及一切時取一鉢盂盛以淨水置少飯及餅食等右手按器作無量威德陀羅尼法誦變食真言二十一徧後稱五如來名號謂多寶寶勝妙色身離怖畏廣博身稱名號已彈指七徧至晚取其食器傾之淨處作此施已諸鬼神等皆獲充足捨此身已必生天上如是供養與佛無異復增名者彼佛願力接引眾生往生極樂故加增之重在戌亥二時若遇是時於事無益凡持戒居山者亦可作此法結來生緣每於清晨以鉢盛水安置佛前持大悲呪二十一徧至午供佛飯一器持變食真言二十一徧至晚持尊勝真言二十一徧稱七如來名號然後散食次與彼受三皈發菩提受佛戒施法食圓滿行人利生之事也次與汝等皈依三寶至三菩提皈依三寶能免三塗自受之後當如法護遠離邪徑直趨覺岸越此無由矣婆龕亦云步欠即實相義所謂一切法等同虗空離諸色相及障礙也實相無相無相不相故名實相即有一性一體三寶之義次與彼發菩提心發有二義一開發二顯發行者則云顯發眾生當云開發本有覺心也故下申偈云今所發覺心至能取所取執此偈即理趣六波羅密經發心之偈覺心者即菩提心遠離性相等者若依於性則平等寂靜尚無生佛之殊焉有上求下化之事依相發心恐墮二乘相有生滅染淨千差萬殊楞嚴云若於因地以生滅心為本修因而求佛乘不生不滅無有是處以世間相體非常住依此發心恐墮凡夫揀此二過故不依也乃至不依五蘊六入十二處十八界能取所取即心境惑業根緣等而發其心謂但有依即是取捨生滅之心非無住真心故曰遠離諸執也諸法悉無我至空性圓寂故云何要離一切諸法以一切法無實主宰本來平等猶若虗空豈虗空而復有所依耶經云虗空無所依云何知如空耶謂自心昔本不生今亦不滅一相無相週徧清淨名為自性涅槃空寂如之故取為喻非謂虗空即涅槃性何也以虗空是頑然無知之物豈比靈覺之性昭昭不昧了了常知古人云不同虗空性自神解者是也如諸佛菩薩至是故志心禮諸佛菩薩既必依如上等法而發其心我今亦以此而發心以故至心頂禮也次與汝等發菩提心汝等諦聽諸佛與我皆發是心是故汝等亦當依此法式而皈依三寶發菩提心也華嚴云欲見十方一切佛欲施無盡功德藏欲滅眾生諸苦惱宜應速發菩提心假使熱鐵輪至菩提心上來藉偈開導彼岸欲其速發大心今正教彼誓發大心也如世尊發菩提心時有大力魔王逼佛皈降若不爾者即飛熱鐵輪摧碎汝頭佛即誓曰假使熱鐵輪在我頂上旋終不為此苦退失菩提心魔聞已讚曰日可令冷月可令熱無上道心難可退轉若得成佛先應度我故今借此偈以儆其堅固道心不可遇緣即退也出報恩經次結發菩提心印誦真言時應想心佛眾生三無差別於一念間融成一廣大月輪如中秋夜中霄無雲之時極甚清涼皎潔與虗空齊等於月輪中想一金色阿字如秋毫之末非有非無當爾之時不得加於了知上無佛可成下無生可度中無行可修煩惱菩提等若知花生死涅槃猶如昨夢此為大要學者於此宜用心焉不惟為鬼神作利行者不久亦就此中了解者矣四食之中識食之義見在此處何者謂開發眾生本有覺性頓同諸佛妙明真性今為汝等至不被染壞當知此心是成佛正因也行願品云諸佛如來以大悲心而為體故因於眾生而起大悲因於大悲生菩提心因菩提心成等正覺從三皈至此方是破煩惱障何則以諸煩惱非定不伏非智不破智慧一起諸惑自除猶如明生暗絕今發大心智慧從茲而起一受大戒禪定因之而生定慧具足何患無明煩惱而不能破乎此名斷惑足可徵矣次與汝等受三昧耶戒至得佛法分上來既發大心堪受三昧耶戒而入佛子數也先申梵網經偈汝等受佛戒即光明金剛寶戒也一受此戒眾生受佛戒即入諸佛位位同大覺已真是諸佛子矣何也夫行與佛同受佛氣分既遊道胎親奉覺胤十身靈相一時具足豈非佛子乎即圓教十住位金剛三昧耶經云明悟佛性者如是之人不存二相雖不出家不住在家雖無法眼亦不具戒能以自心無不自恣而獲聖果大乘千鉢大教經云如來心法金剛自性本來清淨究竟寂滅名之為戒果悟此戒體性一切寶戒自圓頓入如來位名為佛子也次結印誦呪者是平等義除障義警覺義金剛頂經云如入壇輪證三摩地一切義法皆悉具足三聚淨戒俱時圓滿應想印中有白色錽字放大光明普照所召一切有情蒙光照觸三世諸佛戒波羅密一時圓滿法界善法想為光明流光灌頂貯彼身中身同普聖坐大月輪紹諸佛職為佛嫡子次以舍利弗自肯之詞而喜諭也戒即法身悟此者如初生也又非四生之生乃從如來口生從法化生也內障既淨外相自嚴又發大心并受佛戒方名法器堪受法食淨名云於法等者於食亦等若非其器縱受甘露翻成毒藥如獅子乳要瑠璃瓶貯之若非其器則裂既稱佛子當施之以法食資養彼等法身慧命不斷佛種也汝等冥陽諸有情至終無能盡此施食印呪乃是如來在觀世音菩薩所受得者及傳阿難亦止此一章而已前後印呪皆是金剛上士遵瑜伽部集出自利利他始末之由而成一期佛事者也是印呪者乃無量威德自在光明如來之呪印於中觀門不可不精用心此若不到則前所作功德唐捐矣應以右手怖畏彈洒先結三尖印觀赤色吽字出光念吽吽癹怛三徧遣左手魔礙問手有何魔答謂手中有諸戶蟲令迴避也次彈指三下念唵㰠觀一㰠字變空問空手何義答謂此手是父母赤白二點不淨之種所成故今空之復以一念間變成勝妙莊嚴之手於如來兜羅緜手無二無別問上來入定已增長自身成觀音今復何故又遣魔變空答法華經云世尊說無量義已又入三昧放光至開寶塔又入定放光豈不濫耶蓋因一事而彰一法譬如世禮祀宗廟之人非不齋戒沐浴及至登殿之時却又盥手何也謂表敬也今再遣魔變空表慈之深悲之極用心之切也既頓變矣復於左手掌中觀一紅色𠳐字變成紅色蓮花花上有白色錽字月密明點中流出無盡飲食復想面前水器盡為摩竭陀國之斛七寶嚴飾盛滿甘露勝妙飲食等然後想此字種所變之食徧滿法界念唵啞𠶹哩吽一百八徧當爾之時加持令廣大次念變食真言二十一徧以右手戒禪二度於明點中點取甘露彈洒虗空侍者當壇散食俾令事理相應不虗禪觀也摩竭陀國之斛一斛有我國四十九斗所謂斛食者乃桶斛也食飯也名七七之數七粒能變七斛七斛能變四十九斛七而又七變成十方無量之法食也故云斛食白云今為汝等作呪印已變此一食為無量食大如須彌量同法界縱使窮劫取之不盡用之無竭也由此真言力至皆飽滿上來但變種種勝妙飲食未曾融成一味慮恐不均越佛慈濟故復念此乳海真言申此呪力融彼諸食皆成乳海如會眾流統為一味普施餓鬼令彼身心皆悉飽滿受用無乏也問食祇可養身云何心亦飽也答謂此食即法食也食可資身法能養心即上法喜等義復結前印念真言時應想錽字明點中流出甘露右手點取彈洒虗空如雨注下凡所至處即成長河酥酪也問何以小少器水等徧法界答心力難思故也況又藉神呪及字種觀想等力乃至諸佛冥加禪定之力豈不能變小為大化少為多也且如欒巴一之酒以術力故尚能化為霖雨何況神呪之力者乎行者不可不用心焉後漢欒巴為尚書郎誕日聖上賜酒向蜀噀之有司奏不敬巴奏曰臣成都失火故噀酒救之後知成都失火得雨而滅雨中有酒氣是其事也宗鏡錄云以有如此大願智力法性自體空無性力一切所作自然成辦凡夫執著妄見局礙執障若無萬法隨作不離一真之境化儀百變矣是以箭穿石虎非功力之所能醉告三軍豈糵之所造筍抽寒巖非陽和之所發魚躍冰河豈網羅之所致悉為心感致此靈通故知萬法施為皆因自心力耳餘義準思汝等業障鬼至障施鬼真言此復恐彼等業障深重雖已普施甘露未及聞名覩相而其報障猶存卒難解脫或見飲食仍變猛火我今再誦密言加持前食盡成法食不復轉為苦緣也誦真言時應展垂左手想錽字明點中流出甘露從右掌而下念唵啞𠶹哩吽四十九徧侍者至師前問訊取淨瓶水出壇向東立候行者念真言彈指時侍者云淨水徐徐注下行者至唱時想彼障施鬼盡皆胡跪復想自身觀音徧至其前而傾甘露從頂門上滅其業火普得清涼再誦真言五徧各彈指一聲諸佛子等至獲無生忍方以類聚者如前召請四方四隅各以其類而此安置聚集一方物以羣分者物即六道生靈之物各隨羣隊而分之也三塗即三惡道是十惡業者所履之道也四流即天人脩羅神仙皆不免流轉也水族者即溼居鱗甲之屬由無明故愚於我相深生貪著情多下墮故墜水族一沾法水法食頓獲人空毛羣者即飛禽走獸之類楞嚴云七情三想流入橫生重為毛羣輕為羽族此皆不達諸法本空妄生情想若沾法食異執冰消唯心理現諸法自空耳稟識者非有色四蘊而無形質如四空天舜若多神等類是也陶形者有形色而無心者也如無想天及神像有色等是也如食香積如來之飯也未得聖果者即得聖果然後乃消未得法忍者食此飯時即得法忍若今之甘露法食但有沾之者皆離苦得樂究竟證於無生法忍也無生之法忍祇在於心名無生法忍餘不繁釋神呪加持淨法食至普供養印上來所建種種供養普供於六道也淨名云法施會者無前無後一時供養一切眾生是名法施會念真言時應想屈中指處有白色唵字明點中流出無盡供養具足莊嚴矣結印默念梵五供施寶錯念斯麻囉等出聲念普供養真言七徧問最初既奉三寶施食已竟今復何故作此供養答前之所作猶揀凡聖故先奉三寶後施鬼眾今融以平等供養心佛眾生三無差別聖凡一體貴賤等觀所以普供養也諸佛子等至願速成佛此文最顯依義可知無非激勵佛子等眾不復思其人間生命之食離諸苦海永得解脫今受法食發廣大心誓願成佛遞相度脫皆得道果然後方滿我施食之願也所以我之施食普濟法界有情無非欲諸有情同將此福普皆回施於佛果也侍者白此文畢然後云次為汝等稱誦尊勝真言令汝往生大眾同念尊勝呪此呪共有五譯此其一也同聲此處稱念此呪者令圓滿佛事圓滿復有二一神呪圓滿二善根圓滿此即神呪圓滿也主者持花米於手中表大眾同聲念誦此呪加持此米想成光明種已侍者出壇散酒師想佛子觸此光者皆得往生極樂國土上品上生也尊勝經云佛在忉利諸天會處善法堂上為眾說法時有善住天子耽著天樂於其夜分空聲告言善住天子勿自貪著汝七日內必當命終生於閻浮經歷七趣又墮地獄後生人中貧窮下賤生無兩目天子聞已驚恐惶怖具白天主當奈之何天主思惟欲免此苦惟有如來應正等覺是所歸趣於是同詣佛所頭頂禮敬具白善住七趣之事爾時世尊頂髻放光照十方界還復口中現微笑相告帝釋言有一總持名佛頂尊勝乃八十萬億俱胝恒沙諸佛所誦攝受一切如來智印能於如來令受灌頂能護一切有情盡除業障令生樂趣所生之趣能知宿命若持誦之設壽盡者現獲益壽一切地獄鬼畜等界悉皆成空能開一切佛國天界之門隨願往生等唐有梵僧名佛陀波利罽賓國人航海而來忘身殉道徧觀靈跡聞文殊菩薩在清涼山遠涉流沙儀鳳五年杖錫五臺䖍誠禮拜冀覩聖容忽見一老翁從山而出謂波利曰師何所求利曰聞大士隱跡此山從印土來欲求瞻禮翁曰師從彼國還將佛頂尊勝經來否此土眾生多造諸惡出家之輩亦多所犯佛頂神呪除罪祕方速歸持來流傳此土廣利羣品拯接幽冥即是徧奉諸聖報佛恩德取經來至當示所在波利聞已向山作禮舉頭之頃不復見其蹤跡遂歸取經既達帝城詔鴻臚寺日照三藏等於內共譯留內未行波利奏曰委棄身命志在利人請帝流行是所望也遂還梵本於僧順真重譯流行有偈曰西域尊者往東來却被文殊化引開東土若無尊勝呪孤魂難以脫塵埃前後五譯呪亦大同小異廣播華夏者惟南無薄伽伐帝一呪而已後𠽾者乃出本朝仁孝皇后夢感佛說希有功德經後學當以藏本為正若誦若持能淨業障令生樂趣現獲益壽能閉惡道門能開諸佛國故此誦之令圓滿佛事畢利生之功德也復念往生呪三徧謂誦此呪能拔一切業障根本得生淨土之津梁也若想若誦則西方三聖執金剛臺放光接引往生也復念六字真言唵摩抳鉢訥詺二合吽此呪隨所住處有無量諸佛菩薩天龍八部集會又具無量三昧法門誦持之人七代種族皆得解脫腹中諸蟲當得菩薩之位是人圓具諸波羅密功德無盡辯才清淨智聚口所出氣觸人身者令彼離瞋得菩薩位若諸眾生皆得七地所有功德與誦呪者等無有異此呪是觀世音菩薩微妙本心若人書寫誦持則同書持八萬法藏超勝金寶造像若人得此六字大明能離貪瞋癡病此戴持人身手所觸眼目所觀一切有情速得菩薩之位永不復入八苦說此呪已有七十七俱胝佛一時現前同聲說準提呪廣如大乘莊嚴寶王說至此呪念者總欲眾生究竟證果也振鈴誦法樂六趣偈承斯善利至成正覺承斯善利者謂此施食之善利也五趣皆轉苦具為樂緣天則捨樂而發覺心如兜率天子聞天鼓音悟得樂非常住久必壞生畢竟是苦是空而發心求出離也二乘承斯善利則回心向大乘四諦十二因緣而修六度萬行初地菩薩承此善利則福慧具足頓超十地圓滿菩提歸無所得也至此能事畢盡已行者發願回向現世之中至無上佛菩提回向者有三一回向一切有情二回向無上菩提三回向真如實際此中三義皆具若不回向則被相縛盡屬有漏之法譬如百川之水若歸大海則等同一味若回己功德而向實際則一一功德皆如法性廣大無涯無有不成佛也所以云真流之行還契真源若因若果統歸實際若此密門凡作少利益必須回向發願不可歸功於己若不如是墮有漏矣文中鉤鎖連環義意不斷最極明顯識者自詳求索願事並隨行人及請主之意向下略出明相具七功德丈夫身有三種七一約世間者一長壽二妙色三無病四辯才五智慧六威儀七大家業二約小乘者一隨信行二隨法行三信解四見智五身證六慧解七具解脫三約大乘者瑜伽七地即七賢位又瓔珞六位及信一知法二知義三知時四知定五知身六知眾七知尊卑有云即七善法也七種聖財如未曾有經云一信信二進進三戒戒四慚愧五聞聞六捨捨七定慧三災小三災人壽三十歲時身長三尺饑饉災起減至二十歲時人長二尺疾疫災起減至十歲時人長一尺刀兵災起此出俱舍劫章大三災者因本經云大三災起時有大黑風吹使海水兩披取日宮殿置須彌半安一道中緣此世間有二日出河渠流竭久生大風第三日出大恒河竭四日出大海竭五日六日出天下煙起至七日出天下洞然上至梵天火災之後布大黑雲周徧降雨滴如車軸復成世界無數千歲又水災時其水漸漲至光音天此水後滅有大風起鼓動波濤起沫積聚自然堅固變成宮殿七寶嚴飾由此復成梵天次第漸成四天下依前建立水災之後其次久久大毗嵐風至徧淨天其風四布吹諸天宮使宮宮相拍盡碎為末直至天下諸大山王互相岌峇碎為微塵地下水盡水下風盡後還復雨至果實天風鼓波濤起沫積聚如前水災仍舊建立所以小三災損人民大三災壞器界人則生住異滅器則成住壞空五濁一劫濁約四濁假立其名謂四濁增劇聚在此時二煩惱濁五鈍使為體三災為相三眾生濁者見慢果報立此假名惡名穢稱為相四見濁者五利使為體諸見轉盛為相五命濁者連持色心為體摧年減壽為相七難一火二水三羅剎四王五鬼六枷鎖七怨賊名為七難八怖一怖煩惱二怖死三怖天魔四怖無常五怖苦六怖空七怖無我八怖不淨八福田一孝順父母二恭敬沙門三平修險隘四市開義井五水路船橋六給事病人七救濟厄難八設齋賑濟此是世間八福田出世八福田者一深信諸佛二依經法修三遵師訓誡四明解因果五遠惡近善六受佛戒律七轉誦大乘八參禪三輪體空能施之人所施之法受施之者故曰三輪若不住相則三輪體空迴向已主者即念伏以文先舉楞嚴文殊選圓通偈云見聞如幻翳至塵消覺圓淨見聞者六根之首也謂見聞覺知之六根皆由前塵之所黏發正眼看來猶如幻翳是以三界宛然空花何則以目有翳妄見空花翳病若除何花之有若能返聞自性則聞根自復一根既返源六根同解脫翳除塵消覺心明淨淨極光通寂照含虗返觀世間猶如昨夢耳伏以真源湛寂至同圓種智文中無非發明眾生從真起妄淪溺諸趣故如來興慈運悲特駕般若之航普載迷流俱登解脫之岸返妄歸真究竟成於無上菩提也三十六部鬼王光明疏問云何謂神答神者能也大力能移山填壑小力能隱顯變化云何曰鬼婆沙論云鬼者畏也虗怯多畏又威也能令人畏其威也又希求名鬼謂彼餓鬼恒從他人希求飲食以活其命神之與鬼淨名疏云皆鬼道也而有優劣之殊麤分三品細分九類三品者正理論云一無財謂不得飲食二少財謂少得飲食三多財謂多得飲食無財中分三一臭口二炬口三針咽少財中分三一針毛二臭毛三大癭多財分三一得喫二得時三勢力即藥叉羅剎毗舍遮等所受富樂類於人天彼皆人間一月鬼為一日壽五百歲儒者鄭玄子云聖人之精氣謂之神賢人之精氣謂之鬼尸子云天神曰靈地神曰祇人神曰鬼三十六名者一波吒薜茘多二婆羅門仙三婆吒遠害大力四若夜叉吉遮五波羅剎食不淨六飢虗食糞七波吒富單那八婆叉人吉遮九婆羅多熱病十阿附邪接傳送十一波吒吉遮十二毗陀羅多十三若健陀羅十四烏摩勒迦十五阿䟦摩羅十六鳩槃茶羅十七毗舍闍多十八韋陀羅多十九附物為怪二十風行妖怪二十一畜行精魅二十二蟲成蠱毒二十三瘟衰癘瘧二十四陰昧幽視二十五精明魍魎二十六明靈役使二十七阿利帝母二十八食小兒精氣二十九河海精魅三十波吒食尿三十一日月薄蝕三十二波羅遮文茶三十三婆吒食涎便三十四波吒食濃涕三十五婆吒食胎血三十六婆吒摩羅此乃鬼神中之王能統領無量諸鬼舉其主則部落從矣恒河沙舉此以明數之多也此河在西域香山頂上有無熱惱池水流出四河恒河在南廣四十里沙逐水流其細如佛常在此說法舉此為喻五衰天帝將死而現此衰相也有大小之分涅槃經云一花冠萎落二腋下汗流三衣裳垢染四身體臭穢五不樂本座小者俱舍論云一衣服香絕二身光忽滅三浴水沾身四本性囂馳五兩目眴動大現必死小者不定遇緣而可救也四相我相人相眾生相壽者相四恩一父母慈悲顧復之恩二師長有訓導願成之恩三國王有正法治水土之恩四三寶有利樂有情之恩僧俗通俱若能供養給事得無量福未來必能成佛道也三有欲有色有無色有即三界因果不忘謂之有諸佛正法菩薩僧至隨願所成此乃再皈依三寶也始曰未證菩提之間誓願皈依三寶今曰直至菩提我皈依正法源始要終莫不乘三寶之力故不敢忽也復以所修善根非專為己迴為法界眾生同時成佛又願世出世間之法隨願處所成畢竟無諸障礙也謹依瑜伽教至奉送印化事已畢當普奉送先伸偈云三密證作法時應想諸佛菩薩四生六道悉皆不現究理言之而實無來去若有來去何異常情若無迎送不成禮儀謂法身如來本無生滅從真起化接引迷根以化即真真應一際即不來不去故金剛云無所從來亦無所去又化即真本無去來從真流化現有往還即不來相而來不見相而見也不來相而來似水月之頓成不見相而見猶空花之忽現譬諸幻事雖無來去以幻力故分明可見我今所作亦復如是隨願智力萬象頓彰化事既畢諸相奚存緣生無性法應爾故法華云諸法從本來常自寂滅相又如善財參毗目仙人仙人執手即入三昧具見微妙莊嚴等事爾時仙人還攝神通須臾不現此其證也次誦藥叉偈天阿蘇囉藥叉等此偈出隨求孔等經誦此偈者以成善報圓滿也意在誡勉護法神唯當精誠護法并衛國護民也到此下五佛冠誦呪金剛薩埵百字呪此呪乃補闕之謂也或行者手印不次第觀想不專注真言恐誵訛如是等過誦此呪已悉皆清淨復回觀自心月輪上金色阿字一氣默持二十一徧則前來能想所想一一作行皆不可得若不如是則墮有為矣問初入壇時則以𠶹哩字為主此處何得又觀阿字豈前後所主不同耶答𠶹哩字者是大悲真體利生妙智故初以之為主阿字者無生義亦名菩薩威力入無差別境界如上所作皆以如幻三昧宴坐水月道場降伏鏡裏魔軍成就夢中佛事雖有種種差別以此字威力印之當體亦無差別究竟證入無生自性之涅槃也又上來所作皆從因緣生而法性實無生也中論云諸法從緣生亦復從緣滅緣生法不生緣滅法不滅於吾體上何曾有絲毫增益損減也所謂𦦨口豈易語哉皈依三寶至和南聖眾復皈依三寶請求證明耳下座至佛前唱回向偈施食功德殊勝行至波羅密此正行者所集功德盡以回施法界有情同生西方無量佛剎見佛聞法入不退地而證無上道也施食補註竹窗隨筆云𦦨口施食啟教於阿難蓋瑜伽部攝也瑜伽大興於唐之金剛智大廣智不空二師能役使鬼神移易山海威神之力不可思議數傳之後無能嗣之者所存但施食一法而已手結印口誦呪心作觀三業相應之謂瑜伽其事非易易也今印呪未必精而況觀門乎則不相應矣不相應則不惟不能利生而亦或反至害己昨山中一方外僧病已篤是晚外正施食謂看病者言有鬼挈我同出就食辭不往俄復來云法師不誠吾輩空返必有以報之於是牽我臂偕行眾持撓鉤套索云欲拽此法師下地我大驚怖失聲呼救一時散去越數日僧死蓋未死前已與諸鬼為伍矣向非驚叫臺上師危乎哉不惟是耳一僧不誠被鬼舁至河濵欲沈之一僧失鎖衣篋心存匙鑰諸鬼見飯上皆鐵片遂不得食一僧曬氈衣未收值天雨心念此衣諸鬼見飯上皆獸毛遂不得食各受顯報又一人入冥見黑房中有僧數百肌體瘦削顏色憔悴似憂苦不堪之狀問之則皆施食師也施食非易易事也信夫
